<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>CodeViewer - Ituze Studio</title> <link rel="icon" href="images/code.png" type="image/png"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>  <script src="/scrollbar.css"></script>  <style> :root{ --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --accent:#1f6feb; --hover:#21262d; --danger:#f85149; } *{box-sizing:border-box;} body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif; height:100vh; margin:0; display:flex; flex-direction:column; overflow:hidden; } header{ height:55px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; flex-shrink:0; z-index:100; } .logo{ font-weight:bold; color:var(--accent); letter-spacing:1px; font-size:1.2rem; } .mobile-tabs{ display:none; background:var(--panel); border-bottom:1px solid var(--border); height:45px; } .tab-btn{ flex:1; border:none; background:none; color:#8b949e; font-size:12px; text-transform:uppercase; font-weight:600; cursor:pointer; } .tab-btn.active{ color:var(--accent); border-bottom:2px solid var(--accent); } main{ flex:1; display:flex; overflow:hidden; position:relative; } #sidebar{ width:220px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; } .sidebar-header{ padding:15px 10px; font-size:11px; text-transform:uppercase; color:#8b949e; display:flex; justify-content:space-between; border-bottom:1px solid var(--border); } .file-list{ flex:1; overflow-y:auto; } .file-item{ padding:12px 15px; font-size:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #21262d; } .file-item:hover{ background:var(--hover); } .file-item.active{ background:#1f6feb22; border-left:3px solid var(--accent); color:#fff; } .del-btn{ color:var(--danger); opacity:0.5; padding:5px; } #editor-container{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); } .CodeMirror{ flex:1; height:100%!important; font-size:15px; background:var(--bg)!important; } #resizer{ width:6px; cursor:col-resize; background:var(--border); z-index:5; transition:background 0.2s; } #resizer:hover{ background:var(--accent); } #preview-container{ width:40%; display:flex; flex-direction:column; background:#fff; position:relative; } .preview-toolbar{ background:var(--panel); padding:5px; display:flex; gap:5px; justify-content:flex-end; border-bottom:1px solid var(--border); } #preview-frame{ flex:1; border:none; width:100%; height:100%; background:#fff; } .btn{ background:var(--border); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; transition:0.2s; } .btn-primary{ background:var(--accent); border-color:var(--accent); color:white; } .hidden{ display:none; } #resize-overlay{ display:none; position:absolute; top:0; left:0; right:0; bottom:0; z-index:20; } /* FULLSCREEN MODE */ body.fullscreen-preview #sidebar, body.fullscreen-preview #editor-container, body.fullscreen-preview #resizer{ display:none; } body.fullscreen-preview #preview-container{ width:100%!important; flex:1; } /* MOBILE */ @media (max-width:768px){ header .btn:not(.btn-primary){display:none;} .mobile-tabs{display:flex;} #resizer{display:none;} #sidebar,#editor-container,#preview-container{ width:100%!important; display:none; } body.view-files #sidebar{display:flex;} body.view-editor #editor-container{display:flex;} body.view-preview #preview-container{display:flex;} .CodeMirror{font-size:16px;} } </style> </head> <body class="view-editor"> <header> <div class="logo">Ituze Studio</div> <div class="actions"> <button class="btn" onclick="createNewFile()">New File</button> <button class="btn btn-primary" onclick="downloadActiveFile()">Download</button> </div> </header> <nav class="mobile-tabs"> <button class="tab-btn" id="tab-files" onclick="switchTab('files')">Files</button> <button class="tab-btn active" id="tab-editor" onclick="switchTab('editor')">Code</button> <button class="tab-btn" id="tab-preview" onclick="switchTab('preview')">Preview</button> </nav> <main id="main-split"> <div id="sidebar"> <div class="sidebar-header"> <span>Explorer</span> <span style="cursor:pointer;font-weight:bold" onclick="createNewFile()">+</span> </div> <div id="file-list" class="file-list"></div> </div> <div id="editor-container"> <textarea id="editor"></textarea> </div> <div id="resizer"></div> <div id="preview-container"> <div class="preview-toolbar"> <button class="btn" onclick="updatePreview()">Refresh</button> <button class="btn" onclick="toggleFullscreen()">Full Screen</button> </div> <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals" allow="microphone; geolocation; camera" ></iframe> <div id="resize-overlay"></div> </div> </main> <script> let editor; let files={}; let activeFile='index.html'; const defaultProject={ 'index.html':{content:'<!DOCTYPE html>\n<html>\n<head>\n<link rel="stylesheet" href="style.css">\n</head>\n<body>\n<h1>Ituze Studio</h1>\n<p>Live Coding Environment</p>\n<button id="btn">Click Me</button>\n<script src="script.js"><\\/script>\n</body>\n</html>',type:'text'}, 'style.css':{content:'body{\nbackground:#f0f4f8;\nfont-family:sans-serif;\ndisplay:flex;\nflex-direction:column;\nalign-items:center;\njustify-content:center;\nheight:90vh;\n}\nh1{color:#1f6feb;}',type:'text'}, 'script.js':{content:'document.getElementById("btn").onclick=()=>{alert("Logic Active!");};',type:'text'} }; function init(){ const saved=localStorage.getItem('ituze_pro_data'); files=saved?JSON.parse(saved):defaultProject; editor=CodeMirror.fromTextArea(document.getElementById('editor'),{ theme:'dracula', lineNumbers:true, mode:'htmlmixed', lineWrapping:true, tabSize:2, inputStyle:'contenteditable' }); editor.on('change',()=>{ files[activeFile].content=editor.getValue(); saveToLocalStorage(); updatePreview(); }); renderFileList(); switchFile(Object.keys(files)[0]); setupResizer(); updatePreview(); } function switchTab(view){ document.body.className='view-'+view; document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById('tab-'+view).classList.add('active'); if(view==='editor'){ setTimeout(()=>editor.refresh(),50); } } function switchFile(name){ activeFile=name; editor.setValue(files[name].content); let mode='htmlmixed'; if(name.endsWith('.css'))mode='css'; if(name.endsWith('.js'))mode='javascript'; editor.setOption('mode',mode); renderFileList(); if(window.innerWidth<=768)switchTab('editor'); } function renderFileList(){ const list=document.getElementById('file-list'); list.innerHTML=''; Object.keys(files).forEach(name=>{ const div=document.createElement('div'); div.className=`file-item ${name===activeFile?'active':''}`; div.innerHTML=` <span onclick="switchFile('${name}')" style="flex:1">${name}</span> <span class="del-btn" onclick="deleteFile('${name}')">✕</span> `; list.appendChild(div); }); } function createNewFile(){ const name=prompt("Enter filename (index.html, style.css, etc):"); if(name&&!files[name]){ files[name]={content:'',type:'text'}; saveToLocalStorage(); renderFileList(); switchFile(name); } } function deleteFile(name){ if(Object.keys(files).length>1&&confirm(`Delete ${name}?`)){ delete files[name]; if(activeFile===name)activeFile=Object.keys(files)[0]; saveToLocalStorage(); renderFileList(); switchFile(activeFile); } } function updatePreview(){ const frame=document.getElementById('preview-frame'); const html=files['index.html']?files['index.html'].content:''; let css=""; let js=""; Object.keys(files).forEach(name=>{ if(name.endsWith('.css'))css+=`<style>${files[name].content}</style>`; if(name.endsWith('.js'))js+=`<script>${files[name].content}<\\/script>`; }); const combined=html.replace('</head>',css+'</head>').replace('</body>',js+'</body>'); const blob=new Blob([combined],{type:'text/html'}); frame.src=URL.createObjectURL(blob); } function saveToLocalStorage(){ localStorage.setItem('ituze_pro_data',JSON.stringify(files)); } function downloadActiveFile(){ const blob=new Blob([files[activeFile].content],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=activeFile; a.click(); } /* FULLSCREEN */ function toggleFullscreen(){ document.body.classList.toggle('fullscreen-preview'); } /* RESIZER */ function setupResizer(){ const resizer=document.getElementById('resizer'); const editorCont=document.getElementById('editor-container'); const previewCont=document.getElementById('preview-container'); const overlay=document.getElementById('resize-overlay'); let isResizing=false; resizer.addEventListener('mousedown',()=>{ isResizing=true; overlay.style.display='block'; }); window.addEventListener('mousemove',(e)=>{ if(!isResizing||window.innerWidth<=768)return; let sidebarWidth=220; let totalWidth=window.innerWidth-sidebarWidth; let mouseX=e.clientX-sidebarWidth; let percent=(mouseX/totalWidth)*100; percent=Math.max(10,Math.min(90,percent)); editorCont.style.flex=`0 0 ${percent}%`; previewCont.style.width=`${100-percent}%`; editor.refresh(); }); window.addEventListener('mouseup',()=>{ isResizing=false; overlay.style.display='none'; }); } window.onload=init; </script> </body> </html>
