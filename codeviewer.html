<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE Codeviewer - Ituze</title>
    <link rel="icon" href="images/code.png" type="image/png">
     
    <script src="/js/router.js"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="8bbd8a71-e680-441b-9be0-bcc88e5b8d7b"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs/loader.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --accent-hover: #58a6ff;
            --hover: #21262d;
            --danger: #f85149;
            --header-h: 50px;
            --tab-h: 40px;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; outline: none; }
        
        /* Custom Scrollbar for a premium feel */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: var(--header-h);
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        
        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 700; 
            font-size: 15px;
            color: var(--text); 
            letter-spacing: 0.5px;
        }
        .logo-area i { color: var(--accent); }
        
        .actions { display: flex; gap: 10px; }

        main { flex: 1; display: flex; overflow: hidden; }

        #sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, backdrop-filter 0.3s;
            position: relative;
        }
        .glass-sidebar { backdrop-filter: blur(15px); background: rgba(22, 27, 34, 0.6) !important; }

        .sidebar-header {
            padding: 15px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
        }

        .tree-item { 
            cursor: pointer; 
            padding: 6px 15px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 13px; 
            color: var(--text-dim);
            transition: all 0.2s ease;
            user-select: none;
        }
        .tree-item:hover { background: var(--hover); color: var(--text); }
        .tree-item.active { 
            background: #1f6feb15; 
            color: var(--accent); 
            border-left: 3px solid var(--accent); 
            padding-left: 12px;
        }
        .folder-indent { margin-left: 19px; border-left: 1px solid var(--border); }

        #context-menu {
            display: none;
            position: absolute;
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            min-width: 150px;
        }
        .menu-item {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .menu-item:hover { background: var(--hover); }
        .menu-item.danger:hover { background: rgba(248, 81, 73, 0.15); color: var(--danger); }

        #editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        #tab-bar {
            height: var(--tab-h);
            background: var(--panel);
            display: flex;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .tab {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-dim);
            border-right: 1px solid var(--border);
            cursor: pointer;
            background: var(--panel);
            transition: background 0.2s;
            user-select: none;
        }
        .tab:hover { background: var(--hover); }
        .tab.active { background: var(--bg); color: var(--text); border-top: 2px solid var(--accent); }
        .tab-close { opacity: 0.6; transition: opacity 0.2s; }
        .tab-close:hover { opacity: 1; color: var(--danger); }

        #monaco-editor { flex: 1; padding-top: 5px; }

        #resizer { 
            width: 5px; 
            cursor: col-resize; 
            background: var(--border); 
            transition: background 0.2s;
            z-index: 10;
        }
        #resizer:hover, #resizer.active { background: var(--accent); }
        
        #preview-section { width: 40%; display: flex; flex-direction: column; background: #ffffff; position: relative; }
        
        .preview-toolbar {
            background: var(--panel);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        #preview-frame { 
            flex: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            margin: 0 auto; 
            background: #fff;
        }

        #settings-panel {
            position: absolute;
            right: 0; top: 0; bottom: 0; width: 320px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            z-index: 200;
            display: none;
            flex-direction: column;
            box-shadow: -8px 0 24px rgba(0,0,0,0.5);
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        #settings-panel.show {
            display: flex;
            transform: translateX(0);
        }

        .settings-header { 
            padding: 20px; 
            border-bottom: 1px solid var(--border); 
            font-weight: 600; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .settings-content { padding: 20px; overflow-y: auto; flex: 1; }
        .setting-group { margin-bottom: 24px; }
        .setting-label { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; display: block; font-weight: 500; }
        
        input[type="text"], select { 
            width: 100%; 
            background: var(--bg); 
            color: var(--text); 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus { border-color: var(--accent); }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .checkbox-label input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer;}

        .preview-mobile { width: 375px !important; border: 12px solid #222 !important; border-bottom: 25px solid #222 !important; border-radius: 30px; height: calc(100% - 40px) !important; margin: 20px auto !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .preview-tablet { width: 768px !important; border: 12px solid #222 !important; border-radius: 20px; height: calc(100% - 40px) !important; margin: 20px auto !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .btn { 
            cursor: pointer; 
            background: var(--hover); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .btn:hover { background: var(--border); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        /* Utilities */
        .icon-btn { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; display: flex; align-items: center; }
        .icon-btn:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <i data-lucide="terminal-square"></i>
        <span>Ituze IDE</span>
    </div>
    <div class="actions">
        <button class="btn" onclick="openInNewTab()"><i data-lucide="external-link" style="width:16px"></i> Full Screen</button>
        <button class="btn" onclick="toggleSettings()"><i data-lucide="settings" style="width:16px"></i> Settings</button>
        <button class="btn btn-primary" onclick="updatePreview()"><i data-lucide="play" style="width:16px"></i> Run Code</button>
    </div>
</header>

<main>
    <div id="sidebar">
        <div class="sidebar-header">
            <span>Explorer</span>
            <div style="display:flex; gap:10px;">
                <span class="icon-btn" onclick="createItem('file')" title="New File"><i data-lucide="file-plus" style="width:16px"></i></span>
                <span class="icon-btn" onclick="createItem('folder')" title="New Folder"><i data-lucide="folder-plus" style="width:16px"></i></span>
            </div>
        </div>
        <div id="file-tree"></div>

        <div id="context-menu">
            <div class="menu-item" onclick="handleContext('new-file')"><i data-lucide="file-plus" style="width:14px"></i> New File</div>
            <div class="menu-item" onclick="handleContext('new-folder')"><i data-lucide="folder-plus" style="width:14px"></i> New Folder</div>
            <div style="height:1px; background:var(--border); margin: 6px 0;"></div>
            <div class="menu-item danger" id="ctx-delete" onclick="handleContext('delete')"><i data-lucide="trash-2" style="width:14px"></i> Delete</div>
        </div>
    </div>

    <div id="editor-container">
        <div id="tab-bar"></div>
        <div id="monaco-editor"></div>
    </div>

    <div id="resizer"></div>

    <div id="preview-section">
        <div class="preview-toolbar">
            <div style="display:flex; gap:8px;">
                <button class="btn" onclick="resizePreview('desktop')" title="Desktop"><i data-lucide="monitor" style="width:16px"></i></button>
                <button class="btn" onclick="resizePreview('tablet')" title="Tablet"><i data-lucide="tablet" style="width:16px"></i></button>
                <button class="btn" onclick="resizePreview('mobile')" title="Mobile"><i data-lucide="smartphone" style="width:16px"></i></button>
            </div>
            <div id="auto-run-status" style="font-size:11px; font-weight:600; color:var(--text-dim); display:flex; align-items:center; gap:5px;">
                <div style="width:8px; height:8px; border-radius:50%; background:var(--accent);"></div> Auto-run: ON
            </div>
        </div>
        <iframe id="preview-frame" allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; midi; pointer-lock; usb; xr-spatial-tracking" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-pointer-lock allow-popups"></iframe>
        
        <div id="settings-panel">
            <div class="settings-header">
                <span>IDE Settings</span>
                <span class="icon-btn" onclick="toggleSettings()"><i data-lucide="x" style="width:20px"></i></span>
            </div>
            <div class="settings-content">
                <div class="setting-group">
                    <label class="setting-label">Base URL (For Assets/Images)</label>
                    <input type="text" id="set-baseurl" placeholder="https://example.com/" onchange="applySettings()">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Editor Theme</label>
                    <select id="set-theme" onchange="applySettings()">
                        <option value="vs-dark">GitHub Dark</option>
                        <option value="vs">Light</option>
                        <option value="hc-black">High Contrast</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Font Family</label>
                    <select id="set-font" onchange="applySettings()">
                        <option value="'Fira Code', 'JetBrains Mono', monospace">Fira Code / JetBrains</option>
                        <option value="Consolas, monospace">Consolas</option>
                        <option value="monospace">Standard Monospace</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Line Height (1.1 - 3.0)</label>
                    <input type="range" id="set-lineheight" min="1.1" max="3.0" step="0.1" oninput="applySettings()">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Line Wrap</label>
                    <select id="set-wordwrap" onchange="applySettings()">
                        <option value="off">Off</option>
                        <option value="on">On</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Cursor Style</label>
                    <select id="set-cursor" onchange="applySettings()">
                        <option value="line">Line</option>
                        <option value="block">Block</option>
                        <option value="underline">Underline</option>
                        <option value="line-thin">Thin Line</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Appearance & Behavior</label>
                    <label class="checkbox-label"><input type="checkbox" id="set-glass" onchange="applySettings()"> Glass Sidebar</label>
                    <label class="checkbox-label"><input type="checkbox" id="set-numbers" onchange="applySettings()" checked> Show Line Numbers</label>
                    <label class="checkbox-label"><input type="checkbox" id="set-autorun" onchange="applySettings()" checked> Auto-Run Code</label>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let editor;
    let files = {};
    let openTabs = ['index.html'];
    let activeFile = 'index.html';
    let autoRunTimer;

    const defaultFiles = {
        'index.html': { type: 'file', content: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Cyber App</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="card">\n    <h1>Ituze Code Viewer</h1>\n    <p>File management, code editing, and full live preview.</p>\n    <button id="btn">Test Script</button>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>' },
        'style.css': { type: 'file', content: 'body {\n  background: #0d1117;\n  color: #c9d1d9;\n  font-family: system-ui, sans-serif;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n}\n\n.card {\n  text-align: center;\n  padding: 3rem;\n  border: 1px solid #30363d;\n  border-radius: 16px;\n  background: #161b22;\n  box-shadow: 0 12px 32px rgba(0,0,0,0.6);\n  max-width: 400px;\n}\n\nh1 { color: #58a6ff; margin-top: 0; font-size: 1.8rem; }\n\nbutton {\n  background: #238636;\n  color: white;\n  border: 1px solid rgba(240,246,252,0.1);\n  padding: 12px 28px;\n  border-radius: 8px;\n  cursor: pointer;\n  font-weight: 600;\n  font-size: 1rem;\n  transition: all 0.2s;\n  margin-top: 1rem;\n}\n\nbutton:hover {\n  background: #2ea043;\n  transform: translateY(-2px);\n}' },
        'script.js': { type: 'file', content: 'document.getElementById("btn").addEventListener("click", () => {\n  alert("✨ JavaScript execution is working properly!");\n});' },
        'assets': { type: 'folder', children: {} }
    };

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs' }});
    require(['vs/editor/editor.main'], () => {
        initIDE();
    });

    function initIDE() {
        const savedFiles = localStorage.getItem('ituze_files');
        files = savedFiles ? JSON.parse(savedFiles) : defaultFiles;

        const savedSettings = JSON.parse(localStorage.getItem('ituze_settings')) || {
            theme: 'vs-dark', font: "'Fira Code', 'JetBrains Mono', monospace", lineheight: 1.5, wrap: 'on', cursor: 'line', glass: false, numbers: true, autorun: true, baseurl: ''
        };

        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
            theme: savedSettings.theme,
            fontFamily: savedSettings.font,
            fontLigatures: true,
            lineHeight: savedSettings.lineheight * 14,
            wordWrap: savedSettings.wrap,
            cursorStyle: savedSettings.cursor,
            lineNumbers: savedSettings.numbers ? 'on' : 'off',
            automaticLayout: true,
            minimap: { enabled: false },
            padding: { top: 16 },
            scrollBeyondLastLine: false,
            smoothScrolling: true
        });

        editor.onDidChangeModelContent(() => {
            const isAuto = document.getElementById('set-autorun').checked;
            if (isAuto) {
                clearTimeout(autoRunTimer);
                autoRunTimer = setTimeout(() => {
                    saveToLocalStorage();
                    updatePreview();
                }, 900); // slight delay to prevent stuttering while typing fast
            }
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
            saveToLocalStorage();
            updatePreview();
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
            updatePreview();
        });

        setupModels(files);
        
        document.getElementById('set-theme').value = savedSettings.theme;
        document.getElementById('set-font').value = savedSettings.font;
        document.getElementById('set-lineheight').value = savedSettings.lineheight;
        document.getElementById('set-wordwrap').value = savedSettings.wrap;
        document.getElementById('set-cursor').value = savedSettings.cursor;
        document.getElementById('set-glass').checked = savedSettings.glass;
        document.getElementById('set-numbers').checked = savedSettings.numbers;
        document.getElementById('set-autorun').checked = savedSettings.autorun;
        document.getElementById('set-baseurl').value = savedSettings.baseurl || '';
        
        applySettings(false);
        
        if (files['index.html']) {
            switchFile('index.html');
        } else {
            const firstFile = Object.keys(files).find(k => files[k].type === 'file');
            if(firstFile) switchFile(firstFile);
        }

        renderTree();
        setupResizer();
        setupContextMenu();
        lucide.createIcons();
        updatePreview();
    }

    function setupModels(obj, path = '') {
        for (let key in obj) {
            const fullPath = path + key;
            if (obj[key].type === 'file') {
                const ext = key.split('.').pop();
                const lang = ext === 'js' ? 'javascript' : ext === 'css' ? 'css' : ext === 'json' ? 'json' : 'html';
                if (!monaco.editor.getModel(monaco.Uri.parse(`file:///${fullPath}`))) {
                    monaco.editor.createModel(obj[key].content, lang, monaco.Uri.parse(`file:///${fullPath}`));
                }
            } else {
                setupModels(obj[key].children, fullPath + '/');
            }
        }
    }

    // --- File Management ---
    function switchFile(path) {
        activeFile = path;
        const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${path}`));
        if (model) {
            editor.setModel(model);
            if (!openTabs.includes(path)) openTabs.push(path);
            renderTabs();
            renderTree();
        }
    }

    function renderTree() {
        const container = document.getElementById('file-tree');
        container.innerHTML = '';
        
        const buildTree = (obj, parent, path = '') => {
            const keys = Object.keys(obj).sort((a, b) => {
                if (obj[a].type === obj[b].type) return a.localeCompare(b);
                return obj[a].type === 'folder' ? -1 : 1;
            });

            for (let key of keys) {
                const fullPath = path + key;
                const div = document.createElement('div');
                div.className = `tree-item ${fullPath === activeFile ? 'active' : ''}`;
                div.setAttribute('data-path', fullPath);
                
                const icon = obj[key].type === 'folder' ? 'folder' : getFileIcon(key);
                const iconColor = obj[key].type === 'folder' ? '#8b949e' : getFileColor(key);
                
                div.innerHTML = `<i data-lucide="${icon}" style="width:16px; color:${iconColor}"></i> <span>${key}</span>`;
                
                div.onclick = () => {
                    if (obj[key].type === 'file') switchFile(fullPath);
                };
                
                parent.appendChild(div);
                if (obj[key].type === 'folder') {
                    const childCont = document.createElement('div');
                    childCont.className = 'folder-indent';
                    parent.appendChild(childCont);
                    buildTree(obj[key].children, childCont, fullPath + '/');
                }
            }
        };
        buildTree(files, container);
        lucide.createIcons();
    }

    function getFileIcon(filename) {
        if(filename.endsWith('.js')) return 'file-json-2';
        if(filename.endsWith('.css')) return 'paintbrush';
        if(filename.endsWith('.html')) return 'layout-template';
        return 'file-code';
    }

    function getFileColor(filename) {
        if(filename.endsWith('.js')) return '#f7df1e';
        if(filename.endsWith('.css')) return '#264de4';
        if(filename.endsWith('.html')) return '#e34c26';
        return '#8b949e';
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = '';
        openTabs.forEach(path => {
            const name = path.split('/').pop();
            const div = document.createElement('div');
            div.className = `tab ${path === activeFile ? 'active' : ''}`;
            div.innerHTML = `<span>${name}</span> <i data-lucide="x" class="tab-close" style="width:14px" onclick="event.stopPropagation(); closeTab('${path}')"></i>`;
            div.onclick = () => switchFile(path);
            bar.appendChild(div);
        });
        lucide.createIcons();
    }

    function closeTab(path) {
        openTabs = openTabs.filter(p => p !== path);
        if (activeFile === path && openTabs.length > 0) switchFile(openTabs[0]);
        else if (openTabs.length === 0) {
            activeFile = null;
            editor.setModel(null);
        }
        renderTabs();
    }

    function createItem(type) {
        const name = prompt(`Enter ${type} name (e.g. ${type === 'file' ? 'app.js' : 'images'}):`);
        if (name && name.trim()) {
            const cleanName = name.trim();
            if(files[cleanName]) return alert("Name already exists in root.");
            
            if (type === 'file') {
                files[cleanName] = { type: 'file', content: '' };
                setupModels({ [cleanName]: files[cleanName] });
                switchFile(cleanName);
            } else {
                files[cleanName] = { type: 'folder', children: {} };
            }
            saveToLocalStorage();
            renderTree();
        }
    }

    function countHtmlFiles(obj) {
        let count = 0;
        for (let k in obj) {
            if (obj[k].type === 'file' && k.endsWith('.html')) count++;
            if (obj[k].type === 'folder') count += countHtmlFiles(obj[k].children);
        }
        return count;
    }

    function deleteItem(path) {
        const parts = path.split('/');
        const name = parts.pop();
        
        let current = files;
        for (let p of parts) { current = current[p].children; }

        if (current[name].type === 'file' && name.endsWith('.html')) {
            if (countHtmlFiles(files) <= 1) {
                alert("Cannot delete this file. You must keep at least one HTML file.");
                return;
            }
        }

        delete current[name];
        openTabs = openTabs.filter(p => !p.startsWith(path));
        
        if (!openTabs.includes(activeFile)) {
            activeFile = openTabs.length > 0 ? openTabs[0] : null;
            if(activeFile) {
                switchFile(activeFile);
            } else {
                editor.setModel(null);
            }
        } else {
            renderTabs();
        }

        saveToLocalStorage();
        renderTree();
    }

    let ctxTarget = null;
    function setupContextMenu() {
        const sidebar = document.getElementById('sidebar');
        const menu = document.getElementById('context-menu');

        sidebar.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';

            const item = e.target.closest('.tree-item');
            if (item) {
                ctxTarget = item.getAttribute('data-path');
                document.getElementById('ctx-delete').style.display = 'flex';
            } else {
                ctxTarget = null;
                document.getElementById('ctx-delete').style.display = 'none';
            }
        });

        document.addEventListener('click', () => {
            menu.style.display = 'none';
        });
    }

    function handleContext(action) {
        if (action === 'new-file') createItem('file');
        if (action === 'new-folder') createItem('folder');
        if (action === 'delete' && ctxTarget) {
            if (confirm(`Are you sure you want to delete '${ctxTarget}'?`)) {
                deleteItem(ctxTarget);
            }
        }
        document.getElementById('context-menu').style.display = 'none';
    }


    function applySettings(save = true) {
        const settings = {
            theme: document.getElementById('set-theme').value,
            font: document.getElementById('set-font').value,
            lineheight: parseFloat(document.getElementById('set-lineheight').value),
            wrap: document.getElementById('set-wordwrap').value,
            cursor: document.getElementById('set-cursor').value,
            glass: document.getElementById('set-glass').checked,
            numbers: document.getElementById('set-numbers').checked,
            autorun: document.getElementById('set-autorun').checked,
            baseurl: document.getElementById('set-baseurl').value.trim()
        };

        if(editor) {
            monaco.editor.setTheme(settings.theme);
            editor.updateOptions({
                fontFamily: settings.font,
                lineHeight: settings.lineheight * 14,
                wordWrap: settings.wrap,
                cursorStyle: settings.cursor,
                lineNumbers: settings.numbers ? 'on' : 'off'
            });
        }

        const sidebar = document.getElementById('sidebar');
        settings.glass ? sidebar.classList.add('glass-sidebar') : sidebar.classList.remove('glass-sidebar');
        
        const autoRunIndicator = document.getElementById('auto-run-status');
        autoRunIndicator.innerHTML = `<div style="width:8px; height:8px; border-radius:50%; background:${settings.autorun ? 'var(--accent)' : 'var(--text-dim)'};"></div> Auto-run: ${settings.autorun ? 'ON' : 'OFF'}`;

        if (save) {
            localStorage.setItem('ituze_settings', JSON.stringify(settings));
            updatePreview(); 
        }
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        if (panel.classList.contains('show')) {
            panel.classList.remove('show');
            setTimeout(() => panel.style.display = 'none', 300);
        } else {
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('show'), 10);
        }
    }

    function resizePreview(device) {
        const frame = document.getElementById('preview-frame');
        frame.className = '';
        if (device === 'mobile') frame.classList.add('preview-mobile');
        if (device === 'tablet') frame.classList.add('preview-tablet');
    }

    // --- Core Preview Logic ---
    function getBaseTag() {
        const url = document.getElementById('set-baseurl').value.trim();
        if (!url) return '';
        const formattedUrl = url.endsWith('/') ? url : url + '/';
        return `<base href="${formattedUrl}">`;
    }

    function updatePreview() {
        // Smart HTML resolution: Preview active file if it's HTML, otherwise fallback to index.html
        let targetHtmlFile = (activeFile && activeFile.endsWith('.html')) ? activeFile : 'index.html';
        
        const htmlModel = monaco.editor.getModel(monaco.Uri.parse(`file:///${targetHtmlFile}`));
        const cssModel = monaco.editor.getModel(monaco.Uri.parse('file:///style.css'));
        const jsModel = monaco.editor.getModel(monaco.Uri.parse('file:///script.js'));

        // Basic injection approach (appends global style.css and script.js if they exist)
        const htmlContent = htmlModel ? htmlModel.getValue() : '<h1>Error: No HTML file found</h1>';
        const cssContent = cssModel ? cssModel.getValue() : '';
        const jsContent = jsModel ? jsModel.getValue() : '';

        // Inject Base Tag and Styles before </head>, and Scripts before </body>
        let compiled = htmlContent;
        
        if (compiled.includes('</head>')) {
            compiled = compiled.replace('</head>', `\n${getBaseTag()}\n<style>${cssContent}</style>\n</head>`);
        } else {
            compiled = `${getBaseTag()}<style>${cssContent}</style>` + compiled;
        }

        if (compiled.includes('</body>')) {
            compiled = compiled.replace('</body>', `\n<script>${jsContent}<\/script>\n</body>`);
        } else {
            compiled += `\n<script>${jsContent}<\/script>`;
        }

        const blob = new Blob([compiled], { type: 'text/html' });
        document.getElementById('preview-frame').src = URL.createObjectURL(blob);
    }

    function openInNewTab() {
        updatePreview();
        const frameSrc = document.getElementById('preview-frame').src;
        window.open(frameSrc, '_blank');
    }

    function saveToLocalStorage() {
        const updateContent = (obj, path = '') => {
            for (let key in obj) {
                const fullPath = path + key;
                if (obj[key].type === 'file') {
                    const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${fullPath}`));
                    if (model) obj[key].content = model.getValue();
                } else {
                    updateContent(obj[key].children, fullPath + '/');
                }
            }
        };
        updateContent(files);
        localStorage.setItem('ituze_code', JSON.stringify(files));
    }

    // --- Resizer Logic ---
    function setupResizer() {
        const resizer = document.getElementById('resizer');
        const editorCont = document.getElementById('editor-container');
        const previewSect = document.getElementById('preview-section');
        const iframe = document.getElementById('preview-frame');
        let isResizing = false;
        
        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            resizer.classList.add('active');
            iframe.style.pointerEvents = 'none'; 
        });
        
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let offset = e.clientX - 260;
            let percent = (offset / (window.innerWidth - 260)) * 100;
            percent = Math.max(15, Math.min(85, percent));
            editorCont.style.flex = `0 0 ${percent}%`;
            previewSect.style.width = `${100 - percent}%`;
        });
        
        window.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('active');
                iframe.style.pointerEvents = 'auto'; // Restore iframe interactions
            }
        });
    }
</script>
