<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Viewer - Ituze</title>
    <link rel="icon" href="images/code.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="/analytics.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/sw.js"></script>
    
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --accent-hover: #58a6ff;
            --hover: #21262d;
            --danger: #f85149;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        header {
            height: 60px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 700; 
            color: var(--accent);
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn:hover { background: var(--hover); border-color: var(--text-dim); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-run { background: #238636; border-color: #2ea043; color: white; }
        .btn-run:hover { background: #2ea043; border-color: #3fb950; }

        .icon-sm { width: 16px; height: 16px; }

        @media (max-width: 768px) {
            .btn-hide-mobile { display: none; }
        }

        main { flex: 1; display: flex; overflow: hidden; position: relative; }

        #sidebar {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .file-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .file-item {
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            border-left: 3px solid transparent;
        }
        .file-item:hover { background: var(--hover); color: var(--text); }
        .file-item.active { background: #1f6feb15; color: #fff; border-left-color: var(--accent); }
        
        .del-btn { width: 14px; height: 14px; color: var(--border); cursor: pointer; transition: 0.2s; opacity: 0; }
        .file-item:hover .del-btn { opacity: 1; }
        .del-btn:hover { color: var(--danger); }
        .file-item svg:not(.del-btn) { width: 16px; height: 16px; }

        #editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        .CodeMirror { flex: 1; height: 100% !important; font-size: 14px; }

        #resizer { width: 4px; cursor: col-resize; background: var(--border); z-index: 10; transition: background 0.2s; }
        #resizer:hover { background: var(--accent); }

        #preview-section {
            width: 45%;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .preview-toolbar {
            background: var(--panel);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .controls-group { display: flex; gap: 12px; align-items: center; }
        .toolbar-icon { width: 18px; height: 18px; color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .toolbar-icon:hover { color: var(--accent); }

        #preview-frame { 
            flex: 1; 
            border: none; 
            background: #fff;
            width: 100%; 
            height: 100%; 
            transition: width 0.3s, margin 0.3s, border-radius 0.3s;
        }

        .preview-mobile { width: 375px !important; margin: 20px auto; border: 12px solid #333 !important; border-radius: 30px; height: 80% !important; }
        .preview-tablet { width: 768px !important; margin: 20px auto; border: 12px solid #333 !important; border-radius: 20px; height: 90% !important; }

        body.theater-mode #sidebar, body.theater-mode #editor-container, body.theater-mode #resizer { display: none; }
        body.theater-mode #preview-section { width: 100% !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="layout" aria-hidden="true" class="lucide lucide-layout"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18"></path><path d="M9 21V9"></path></svg>
            <span>Ituze Code Viewer<span style="font-weight:300; opacity: 0.7;"></span></span>
        </div>
        <div class="actions">
            <button class="btn btn-hide-mobile" onclick="createNewFile()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="file-plus" aria-hidden="true" class="lucide lucide-file-plus icon-sm"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"></path><path d="M14 2v5a1 1 0 0 0 1 1h5"></path><path d="M9 15h6"></path><path d="M12 18v-6"></path></svg> 
                New
            </button>
            <button class="btn" onclick="downloadProject()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="archive" aria-hidden="true" class="lucide lucide-archive icon-sm"><rect width="20" height="5" x="2" y="3" rx="1"></rect><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"></path><path d="M10 12h4"></path></svg> 
                Export ZIP
            </button>
            <button class="btn btn-primary" onclick="downloadActiveFile()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="download" aria-hidden="true" class="lucide lucide-download icon-sm"><path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg> 
                Download File
            </button>
        </div>
    </header>

    <main>
        <div id="sidebar">
            <div class="sidebar-header">
                <span>Explorer</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="plus-circle" aria-hidden="true" style="cursor:pointer; width: 16px;" onclick="createNewFile()" class="lucide lucide-plus-circle"><circle cx="12" cy="12" r="10"></circle><path d="M8 12h8"></path><path d="M12 8v8"></path></svg>
            </div>
            <div id="file-list" class="file-list"></div>
        </div>

        <div id="editor-container">
            <textarea id="editor"></textarea>
        </div>

        <div id="resizer"></div>

        <div id="preview-section">
            <div class="preview-toolbar">
                <div class="controls-group">
                    <button class="btn btn-run" onclick="updatePreview()" style="padding: 4px 12px; margin-right: 8px;">
                        <i data-lucide="play" class="icon-sm"></i> Run Code
                    </button>
                    <div style="width:1px; height:16px; background:var(--border);"></div>
                    
                    <i data-lucide="monitor" class="toolbar-icon" onclick="resizePreview('100%')" title="Desktop View"></i>
                    <i data-lucide="tablet" class="toolbar-icon" onclick="resizePreview('tablet')" title="Tablet View"></i>
                    <i data-lucide="smartphone" class="toolbar-icon" onclick="resizePreview('mobile')" title="Mobile View"></i>
                    
                    <div style="width:1px; height:16px; background:var(--border);"></div>
                    <i data-lucide="external-link" class="toolbar-icon" title="Open Preview in New Tab" onclick="openInNewTab()"></i>
                </div>
                <div class="controls-group">
                    <i data-lucide="maximize-2" class="toolbar-icon" onclick="toggleTheater()" title="Toggle Fullscreen"></i>
                </div>
            </div>

            <iframe 
                id="preview-frame" 
                allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; midi; pointer-lock; usb; xr-spatial-tracking"
                sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-pointer-lock allow-popups"
            ></iframe>
        </div>
    </main>

    <script>
        let editor;
        let files = {};
        let activeFile = 'index.html';
        let currentBlobUrl = null;

        const defaultProject = {
            'index.html': { content: '<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <title>Cyber App</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="card">\n    <h1>Ituze Code Viewer</h1>\n    <p>File management, code editing, and full hardware permissions.</p>\n    <button id="btn">Test Script</button>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>', type: 'text' },
            'style.css': { content: 'body {\n  background: #0d1117;\n  color: #c9d1d9;\n  font-family: system-ui;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 90vh;\n  margin: 0;\n}\n.card {\n  text-align: center;\n  padding: 2.5rem;\n  border: 1px solid #30363d;\n  border-radius: 12px;\n  background: #161b22;\n  box-shadow: 0 8px 24px rgba(0,0,0,0.5);\n}\nh1 { color: #58a6ff; margin-top: 0; }\nbutton {\n  background: #238636;\n  color: white;\n  border: 1px solid rgba(240,246,252,0.1);\n  padding: 10px 24px;\n  border-radius: 6px;\n  cursor: pointer;\n  font-weight: bold;\n  transition: 0.2s;\n}\nbutton:hover { background: #2ea043; }', type: 'text' },
            'script.js': { content: 'document.getElementById("btn").addEventListener("click", () => {\n  alert("JavaScript execution is working properly!");\n});', type: 'text' }
        };

        function init() {
            const saved = localStorage.getItem('ituze_code_viewer_v1');
            files = saved ? JSON.parse(saved) : defaultProject;

            if (!files['index.html']) files['index.html'] = defaultProject['index.html'];
            if(!files[activeFile]) activeFile = 'index.html';

            editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
                theme: 'dracula',
                lineNumbers: true,
                mode: 'htmlmixed',
                indentUnit: 4,
                autoCloseBrackets: true,
                matchBrackets: true
            });

            editor.on('change', () => {
                if (files[activeFile]) {
                    files[activeFile].content = editor.getValue();
                    saveData();
                }
            });

            renderFileList();
            switchFile(activeFile);
            setupResizer();
            updatePreview();
            lucide.createIcons();
        }

        function saveData() {
            localStorage.setItem('ituze_code_viewer_v1', JSON.stringify(files));
        }

        function switchFile(name) {
            if (!files[name]) return;
            activeFile = name;
            editor.setValue(files[name].content);
            const mode = name.endsWith('.js') ? 'javascript' : name.endsWith('.css') ? 'css' : 'htmlmixed';
            editor.setOption('mode', mode);
            renderFileList();
        }

        function getFileIcon(name) {
            if (name.endsWith('.html')) return '<i data-lucide="file-code-2" style="width:16px"></i>';
            if (name.endsWith('.css')) return '<i data-lucide="palette" style="width:16px"></i>';
            if (name.endsWith('.js')) return '<i data-lucide="braces" style="width:16px"></i>';
            return '<i data-lucide="file" style="width:16px"></i>';
        }

        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            Object.keys(files).forEach(name => {
                const div = document.createElement('div');
                div.className = `file-item ${name === activeFile ? 'active' : ''}`;
                div.onclick = () => switchFile(name);
                
                div.innerHTML = `
                    ${getFileIcon(name)}
                    <span style="flex:1">${name}</span>
                    <i data-lucide="trash-2" class="del-btn" onclick="event.stopPropagation(); deleteFile('${name}')"></i>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function deleteFile(name) {
            if (name === 'index.html') {
                alert("Cannot delete index.html");
                return;
            }
            if (confirm(`Delete ${name}?`)) {
                delete files[name];
                saveData();
                if (activeFile === name) switchFile('index.html');
                else renderFileList();
            }
        }

        function updatePreview() {
            const frame = document.getElementById('preview-frame');
            if (!files['index.html']) return;
            
            let html = files['index.html'].content;
            
            if (files['style.css']) {
                html = html.replace(/<link[^>]*href=["']?style\.css["']?[^>]*>/i, `<style>${files['style.css'].content}</style>`);
            }
            if (files['script.js']) {
                html = html.replace(/<script[^>]*src=["']?script\.js["']?[^>]*><\/script>/i, `<script>${files['script.js'].content}<\/script>`);
            }

            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            const blob = new Blob([html], { type: 'text/html' });
            currentBlobUrl = URL.createObjectURL(blob);
            frame.src = currentBlobUrl;
        }

        function openInNewTab() {
            if (currentBlobUrl) window.open(currentBlobUrl, '_blank');
        }

        function resizePreview(size) {
            const frame = document.getElementById('preview-frame');
            frame.className = '';
            if(size === 'mobile') frame.classList.add('preview-mobile');
            else if(size === 'tablet') frame.classList.add('preview-tablet');
        }

        function toggleTheater() {
            document.body.classList.toggle('theater-mode');
            setTimeout(() => editor.refresh(), 300);
        }

        function createNewFile() {
            const n = prompt("Enter file name (e.g. game.js, theme.css):");
            if (n && n.trim() !== '') {
                if (files[n]) {
                    alert("A file with that name already exists!");
                } else {
                    files[n] = { content: "/* New File */", type: "text" };
                    saveData();
                    renderFileList();
                    switchFile(n);
                }
            }
        }

        function downloadActiveFile() {
            if (!files[activeFile]) return;
            const content = files[activeFile].content;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFile;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function downloadProject() {
            if (typeof JSZip === 'undefined') {
                alert("Zip library is still loading. Try again in a second.");
                return;
            }
            const zip = new JSZip();
            Object.keys(files).forEach(fileName => {
                zip.file(fileName, files[fileName].content);
            });
            
            const zipBlob = await zip.generateAsync({type:"blob"});
            const url = URL.createObjectURL(zipBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "ituze-project.zip";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function setupResizer() {
            const resizer = document.getElementById('resizer');
            const editorCont = document.getElementById('editor-container');
            const previewSect = document.getElementById('preview-section');
            let isResizing = false;

            resizer.addEventListener('mousedown', () => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.getElementById('preview-frame').style.pointerEvents = 'none'; 
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const sidebarWidth = 240;
                let total = window.innerWidth - sidebarWidth;
                let offset = e.clientX - sidebarWidth;
                let percent = (offset / total) * 100;
                
                percent = Math.max(15, Math.min(85, percent)); 
                editorCont.style.flex = `0 0 ${percent}%`;
                previewSect.style.width = `${100 - percent}%`;
            });
            
            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = 'default';
                    document.getElementById('preview-frame').style.pointerEvents = 'auto';
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
