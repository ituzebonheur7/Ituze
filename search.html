<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RPPG857F8"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date);gtag('config','G-4RPPG857F8')</script>

<style>
:root {
    --accent: #00d4ff;
    --bg: #0f0f0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: radial-gradient(circle at top, #151515, #0a0a0a);
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 35px;
    width: 340px;
    text-align: center;
    display: none; /* Hidden by default to prevent flicker during fast redirect */
    animation: fadeIn 0.4s ease forwards;
}

.loading-text {
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
    margin-bottom: 10px;
}

select {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: #121212;
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
}

.checkbox-container {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 0.85rem;
    cursor: pointer;
    user-select: none;
}

input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
}

button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    background: #fff;
}

small {
    display: block;
    margin-top: 10px;
    opacity: 0.5;
    font-size: 0.75rem;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="panel" id="setup-ui">
    <div class="loading-text">Choose Search Engine</div>
    <select id="engine-selector">
        <option value="google">Google</option>
        <option value="googleai">Google AI</option>
        <option value="bing">Bing</option>
        <option value="duckduckgo">DuckDuckGo</option>
        <option value="brave">Brave</option>
        <option value="startpage">Startpage</option>
        <option value="you">You.com</option>
        <option value="perplexity">Perplexity</option>
        <option value="ecosia">Ecosia</option>
        <option value="yahoo">Yahoo</option>
        <option value="yandex">Yandex</option>
    </select>
    
    <label class="checkbox-container">
        <input type="checkbox" id="set-default" checked>
        Set as default (Don't ask again)
    </label>

    <button onclick="saveAndRedirect()">Search Now</button>
</div>

<script>
const searchEngines = {
    google: "https://www.google.com/search?q=",
    googleai: "https://www.google.com/aimode?q=",
    bing: "https://www.bing.com/search?q=",
    duckduckgo: "https://duckduckgo.com/?q=",
    brave: "https://search.brave.com/search?q=",
    startpage: "https://www.startpage.com/do/search?query=",
    you: "https://you.com/search?q=",
    ecosia: "https://www.ecosia.org/search?q=",
    yahoo: "https://search.yahoo.com/search?p=",
    yandex: "https://yandex.com/search/?text=",
    perplexity: "https://www.perplexity.ai/search?q=",
};

const utmSource = "ItuzeBonheur";

(function() {
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q");

    if (!query || !query.trim()) {
        window.location.replace("https://ituzebonheur.com");
        return;
    }

    const savedEngine = localStorage.getItem("defaultSearchEngine");
    const skipSelection = localStorage.getItem("skipSelection") === "true";

    if (savedEngine && searchEngines[savedEngine] && skipSelection) {
        const destination = searchEngines[savedEngine] + encodeURIComponent(query) + "&utm_source=" + encodeURIComponent(utmSource);
        window.location.replace(destination);
    } else {
        document.getElementById("setup-ui").style.display = "block";
        if (savedEngine) {
            document.getElementById("engine-selector").value = savedEngine;
        }
    }
})();

function saveAndRedirect() {
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q");
    const selection = document.getElementById("engine-selector").value;
    const isDefault = document.getElementById("set-default").checked;

    if (!selection || !query) return;

    // Save preferences
    localStorage.setItem("defaultSearchEngine", selection);
    localStorage.setItem("skipSelection", isDefault);

    const destination = searchEngines[selection] + encodeURIComponent(query) + "&utm_source=" + encodeURIComponent(utmSource);
    window.location.replace(destination);
}
</script>

</body>
</html>
