  <style>
   :root {
     --text-main: #cbd5e1;
     --bg-dark: #020617;
   }
    * { box-sizing: border-box; }
    html, body, * {
      -ms-overflow-style: none;
      scrollbar-width: none;   
    }
    *::-webkit-scrollbar { display: none !important; width: 0; height: 0; }
    

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #020617;
      background-image: radial-gradient(circle at top, #0b1120 0%, #020617 55%, #000 100%);
      background-attachment: fixed;
      color: var(--text-main);
      overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: -1;
      background: transparent !important;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    }

    .top-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 100px;
      height: 42px;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      background: var(--glass-bg);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      cursor: pointer;
      z-index: 1200;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-btn.hidden {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    #iframePanel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 100px;
      height: 42px;
      border-radius: 25px;
      opacity: 0;
      pointer-events: none;
      z-index: 2000;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 0 rgba(0,0,0,0);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #iframePanel.open {
      opacity: 1;
      width: 400px;
      height: 600px;
      border-radius: 24px;
      pointer-events: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }
    #iframePanelContent {
      width: 100%;
      height: 100%;
      display: flex;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #iframePanel.open #iframePanelContent {
      opacity: 1;
    }
    #iframePanelContent iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #settingsToggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.8;
      font-size: 20px;
      transition: 0.3s;
      z-index: 1500;
    }
    #settingsToggle:hover {
      opacity: 1;
      transform: rotate(45deg) scale(1.06);
      box-shadow: 0 0 18px var(--accent);
    }

    #settingsPanel {
      position: fixed;
      top: 70px;
      right: 20px;
      width: 420px;
      padding: 20px;
      border-radius: 16px;
      opacity: 0;
      transform: translateY(-16px);
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 2000;

      max-height: calc(100vh - 100px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    #settingsPanel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #settingsPanel h3 {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 600;
    }

    .settings-group {
      margin-bottom: 16px;
    }

    .settings-group label {
      display: block;
      font-size: 11px;
      margin-bottom: 6px;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .settings-group select, .settings-group input[type="text"], .settings-group input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.35);
      color: #e5e7eb;
      outline: none;
      appearance: none;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .settings-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .container {
      position: absolute;
      top: 43%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(980px, 96vw);
      text-align: center;
    }

    .date { font-size: 15px; opacity: 0.8; margin-bottom: 4px; }
    .clock { font-size: 40px; font-weight: 600; margin-bottom: 4px; }
    .greeting {
      font-size: 46px;
      font-weight: 800;
      margin-bottom: 12px;
      text-shadow: 0 0 22px var(--accent);
    }
    .tz { font-size: 13px; opacity: 0.8; margin-bottom: 16px; }

    .chrome-search-wrapper {
      width: 100%;
      max-width: 820px;
      margin: 0 auto 25px;
      position: relative;
    }

    .chrome-search {
      display: flex;
      align-items: center;
      height: 52px;
      padding: 0 16px;
      border-radius: 32px;
    }

    .chrome-search input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 17px;
      color: #fff;
      outline: none;
    }

    .chrome-search input::placeholder {
      color: rgba(255,255,255,0.75);
    }

    .chrome-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.75;
      color: #fff;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      transform-origin: center;
    }
    .icon-btn:hover {
      opacity: 1;
      text-shadow: 0 0 12px var(--accent);
      transform: scale(1.06);
    }

    .icon-btn.listening {
      box-shadow: 0 0 18px var(--accent), 0 0 42px color-mix(in srgb, var(--accent) 30%, rgba(0,0,0,0));
      transform: scale(1.04);
    }

    .ai-mode-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      transform-origin: center;
    }
    .ai-mode-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent);
      transform: scale(1.04);
    }

    .suggestions {
      position: absolute;
      top: 58px;
      left: 0;
      width: 100%;
      border-radius: 18px;
      display: none;
      overflow: hidden;
      z-index: 1000;
      text-align: left;
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 0;
    }

    .suggestion-item {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #fff;
      text-align: left;
      background: transparent;
      user-select: none;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      transform-origin: left center;
      transition: 0.12s ease;
    }
    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255,255,255,0.04);
      transform: scale(1.01);
    }
    .suggestion-meta {
      opacity: 0.7;
      font-size: 12px;
      color: #cbd5e1;
    }

    .shortcuts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .shortcuts-row {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(5, 1fr);
    }

    .shortcut {
      padding: 12px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-size: 14px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 500;
      transform-origin: center;
    }
    .shortcut:hover {
      transform: scale(1.06);
      box-shadow: 0 18px 50px rgba(0,0,0,0.7);
      border-color: var(--accent);
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
      z-index: 2500;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #battery {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 50;
    }

    #battery-icon {
      width: 18px;
      height: 10px;
      border-radius: 3px;
      border: 2px solid #e5e7eb;
      position: relative;
    }

    #battery-icon::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 3px;
      height: 6px;
      border-radius: 1px;
      background: #e5e7eb;
    }

    #battery-level-bar {
      position: absolute;
      left: 1px;
      top: 1px;
      bottom: 1px;
      border-radius: 2px;
      background: var(--accent);
      width: 50%;
    }

    .ripple {
      position: absolute;
      border-radius: 999px;
      transform: scale(0);
      animation: ripple 0.5s ease-out;
      pointer-events: none;
      background: color-mix(in srgb, var(--accent) 35%, white);
      opacity: 0.4;
    }

    @keyframes ripple {
      to {
        transform: scale(3.5);
        opacity: 0;
      }
    }

      background: rgba(15,23,42,var(--launcher-opacity));
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--launcher-border-color);

      border-radius: 26px;
      box-shadow:
        0 18px 45px rgba(0,0,0,0.75),
        0 0 40px var(--accent);

      display: none;
      z-index: 2100;
      overflow: hidden;

      opacity: 0;
      transform: translateY(20px) scale(0.96);
      transition: opacity .28s ease, transform .28s ease;
     }

    .launcher-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .launcher-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--accent) 70%, #e5e7eb);
    }

    .launcher-close {
      border: none;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.7;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      padding: 4px 8px;
      transform-origin: center;
    }
    .launcher-close:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    .launcher-search {
      margin-bottom: 10px;
    }

    .launcher-search-input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.6);
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
    }

    .launcher-scroll {
      max-height: 440px;
      overflow-y: scroll;
      padding-right: 4px;
      scrollbar-width: none;
    }
    .launcher-scroll::-webkit-scrollbar {
      display: none;
    }

    .launcher-section {
      margin-bottom: 14px;
      border-radius: 16px;
      background: var(--launcher-section-bg);
      border: 1px solid var(--launcher-section-border);
      overflow: hidden;
    }

    .launcher-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .launcher-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      opacity: 0.9;
    }

    .launcher-section-toggle {
      font-size: 14px;
      color: #9ca3af;
      transition: transform 0.2s ease;
    }

    .launcher-section.collapsed .launcher-section-toggle {
      transform: rotate(-90deg);
    }

    .launcher-list-wrapper {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .launcher-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .launcher-item {
      border-top: 1px solid rgba(31,41,55,0.9);
    }

    .launcher-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
      text-decoration: none;
      color: #e5e7eb;
      transition: background 0.18s ease, transform 0.12s ease;
      position: relative;
      overflow: hidden;
      border-radius: 0;
    }

    .launcher-link span {
      opacity: 0.95;
    }

    .launcher-link small {
      font-size: 11px;
      color: #9ca3af;
      opacity: 0.85;
      margin-left: 8px;
    }

    .launcher-link:hover {
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--accent) 25%, transparent),
        rgba(15,23,42,0.9)
      );
      transform: scale(1.02);
    }

    .launcher-empty {
      font-size: 12px;
      color: #9ca3af;
      padding: 6px 10px 2px;
      font-style: italic;
    }

    /* Custom color UI inside settings */
    .custom-color-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .custom-color-row input[type="color"] {
      width: 40px;
      height: 34px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .custom-color-row input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.35);
      color: #e5e7eb;
      outline: none;
      font-family: monospace;
    }

    /* custom context menu for shortcuts / empty space */
    .context-menu {
      position: fixed;
      background: rgba(5,7,10,0.98);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px;
      z-index: 5000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
      min-width: 160px;
    }
    .context-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px;
      background: transparent;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.18s ease, transform 0.15s cubic-bezier(0.4,0,0.2,1), box-shadow 0.18s ease;
    }
    .context-menu button:hover {
      background: rgba(255,255,255,0.06);
      transform: scale(1.03);
    }
    .context-menu button:active {
      transform: scale(0.97);
    }

    /* ── Universal button transition polish ── */
    button, .top-btn, .icon-btn, .ai-mode-btn, .launcher-close,
    #settingsToggle, #resetStorage, #weatherRefreshBtn, .save-btn {
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease,
                  box-shadow 0.22s ease, transform 0.18s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.2s ease !important;
    }
    button:active, .top-btn:active, .icon-btn:active,
    .ai-mode-btn:active, .launcher-close:active, #resetStorage:active,
    #weatherRefreshBtn:active, .save-btn:active {
      transform: scale(0.94) !important;
      opacity: 0.85 !important;
    }
    #resetStorage, .save-btn {
      cursor: pointer;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    #resetStorage:hover, .save-btn:hover {
      filter: brightness(1.15);
      box-shadow: 0 0 18px rgba(239,68,68,0.5);
      transform: scale(1.04) !important;
    }

    /* ── Weather Detail Card ── */
    #weatherDetailCard {
      position: fixed;
      bottom: 70px;
      left: 80px;
      width: 240px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(5,8,15,0.92);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      z-index: 2060;
      opacity: 0;
      transform: translateY(10px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      color: var(--text-main);
      font-size: 13px;
    }
    #weatherDetailCard.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .weather-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .weather-detail-row:last-child { border-bottom: none; }
    .weather-detail-label { opacity: 0.6; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .weather-detail-value { font-weight: 600; color: var(--accent); }
    .weather-forecast-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.07);
      gap: 4px;
    }
    .forecast-day {
      flex: 1;
      text-align: center;
      font-size: 11px;
    }
    .forecast-day .fd-label { opacity: 0.55; margin-bottom: 2px; }
    .forecast-day .fd-temp { font-weight: 600; color: var(--accent); font-size: 12px; }
    .forecast-day .fd-icon { font-size: 16px; }
    #weatherDetailCard .wd-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      opacity: 0.85;
      margin-bottom: 8px;
      font-weight: 600;
    }
    #weatherRefreshBtn {
      margin-top: 10px;
      width: 100%;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      font-size: 11px;
      cursor: pointer;
    }
    #weatherRefreshBtn:hover {
      background: rgba(255,255,255,0.09);
      border-color: var(--accent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 35%, transparent);
      transform: scale(1.03) !important;
    }

    /* Weather wedge (bottom-left, next to apps) */
    #weatherWedge {
      position: fixed;
      bottom: 20px;
      left: 80px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10,12,15,0.6);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 13px;
      z-index: 2050;
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: default;
      transition: transform 0.18s ease;
    }
    #weatherWedge:hover { transform: scale(1.03); }

    @media (max-width: 900px) {
      .shortcuts-row {
        grid-template-columns: repeat(3, 1fr);
      }
      #settingsPanel { width: 340px; right: 12px; }
      #weatherWedge { left: 76px; }
      #iframePanel {
        width: 90vw;
        height: auto;
        max-height: 70vh;
        left: 5vw;
        right: 5vw;
      }
    }

    @media (max-width: 600px) {
      .shortcuts-row {
        grid-template-columns: repeat(2, 1fr);
      }

      #weatherWedge { display: none; }
      #iframePanel {
        width: calc(100vw - 20px);
        height: auto;
        max-height: 80vh;
        left: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>

  <script src="/js/screen.js"></script>

  <canvas id="matrix"></canvas>

  <button id="topLink" class="top-btn" aria-label="Open Ituze profile">
    Ituze
  </button>

  <div id="iframePanel">

  <script>
    /* =========================================
       Iframe Panel Management
       ========================================= */
    const iframePanel = document.getElementById("iframePanel");
    const topBtn = document.getElementById("topLink");
    const profileIframe = document.getElementById("profileIframe");
    let isPanelOpen = false;

    function openIframePanel() {
      closeAllPanels([iframePanel]);
      profileIframe.src = profileIframe.src; // Force Refresh
      topBtn.classList.add("hidden");
      iframePanel.classList.add("open");
      isPanelOpen = true;
    }

    function closeIframePanel() {
      iframePanel.classList.remove("open");
      topBtn.classList.remove("hidden");
      isPanelOpen = false;
    }

    function toggleIframePanel() {
      if (iframePanel.classList.contains("open")) {
        closeIframePanel();
      } else {
        openIframePanel();
      }
    }

    topBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openIframePanel();
    });

    /* =========================================
       Constants & basic UI wiring
       ========================================= */
    const SEARCH_ENGINES = {
      ituze: "https://ituzebonheur.com/search?q=",
      google: "https://google.com/search?q=",
      bing: "https://bing.com/search?q=",
      duckduckgo: "https://duckduckgo.com/?q=",
      brave: "https://search.brave.com/search?q=",
      startpage: "https://www.startpage.com/do/search?q=",
      you: "https://you.com/search?q="
    };

    const GOOGLE_AI_MODE_URL = (q) => `https://www.google.com/aimode?q=${encodeURIComponent(q)}`;
    const GOOGLE_AIMODE_LANDING = "https://www.google.com/aimode";

    // Wire AI Mode button
    document.getElementById("aiModeBtn").addEventListener("click", () => {
      const q = (searchInput.value || "").trim();
      const url = q ? GOOGLE_AI_MODE_URL(q) : GOOGLE_AIMODE_LANDING;
      openLink(url);
    });

    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    let matrixInterval = null;
    let matrixEnabled = true;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", () => {
      resizeCanvas();
      initDrops();
    });

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 16;
    let columns = canvas.width / fontSize;
    let drops = [];

    function initDrops() {
      columns = Math.floor(canvas.width / fontSize);
      drops = Array.from({ length: columns }, () => 1);
    }
    initDrops();

    function drawMatrix() {
      if (!matrixEnabled) return;
      ctx.fillStyle = "rgba(0,0,0,0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = getComputedStyle(document.documentElement)
        .getPropertyValue("--matrix-color") || "#00ff9c";

      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    function startMatrix() {
      if (!matrixInterval) {
        matrixInterval = setInterval(drawMatrix, 35);
      }
    }

    function stopMatrix() {
      clearInterval(matrixInterval);
      matrixInterval = null;
    }

    startMatrix();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopMatrix();
      else startMatrix();
    });

    /* =========================================
       Time, Timezone & Locale
       ========================================= */
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date");
    const tzEl = document.getElementById("timezoneDisplay");
    const displayNameInput = document.getElementById("displayNameInput");

    function getTimeZoneName() {
      try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (tz) return tz;
      } catch (e) {}
      return "UTC";
    }

    function prefers12HourInUS() {
      try {
        const lg = (navigator.language || "").toLowerCase();
        if (lg.includes("en-us") || lg.includes("us")) return true;
        const tz = getTimeZoneName().toLowerCase();
        if (tz.startsWith("america/")) return true;
      } catch (e) {}
      return false;
    }

    let FORCE_12_HOUR = prefers12HourInUS();
    const TIMEZONE_NAME = getTimeZoneName();

    function updateClock() {
      const now = new Date();
      const hour12 = FORCE_12_HOUR;
      const timeOptions = {
        hour: "2-digit", minute: "2-digit", second: "2-digit",
        hour12,
        timeZone: TIMEZONE_NAME
      };
      const dateOptions = { weekday: "long", month: "long", day: "numeric", timeZone: TIMEZONE_NAME };

      try {
        clockEl.textContent = new Intl.DateTimeFormat(undefined, timeOptions).format(now);
        dateEl.textContent = new Intl.DateTimeFormat(undefined, dateOptions).format(now);
      } catch (e) {
        clockEl.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        dateEl.textContent = now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
      }

      try {
        const offsetMin = -now.getTimezoneOffset();
        const sign = offsetMin >= 0 ? "+" : "-";
        const hh = String(Math.floor(Math.abs(offsetMin) / 60)).padStart(2, "0");
        const mm = String(Math.abs(offsetMin) % 60).padStart(2, "0");
        tzEl.textContent = `${TIMEZONE_NAME} (UTC${sign}${hh}:${mm})`;
      } catch (e) {
        tzEl.textContent = TIMEZONE_NAME;
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    function updateGreeting() {
      const hour = new Date().getHours();
      const name = (localStorage.getItem("displayName") || "Ituze");
      let text = `Welcome, ${name}`;
      if (hour < 12) text = `Good morning, ${name}`;
      else if (hour < 18) text = `Good afternoon, ${name}`;
      else text = `Good evening, ${name}`;
      document.getElementById("greeting").textContent = text;
    }
    updateGreeting();

    /* =========================================
       Search / suggestions + omnibox commands
       ========================================= */

    const searchInput = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestions");
    const toggleSuggestionsEl = document.getElementById("toggleSuggestions");
    const toggleLocalOnlyEl = document.getElementById("toggleLocalOnly");
    const engineSelect = document.getElementById("engineSelect");
    const toggleKeyboardEl = document.getElementById("toggleKeyboard");
    let activeSuggestionIndex = -1;

    function saveToHistory(q) { /* no-op */ }
    function readHistory(limit = 8) { return []; }

    function getEngineUrl() {
      const key = localStorage.getItem("searchEngine") || "ituze";
      return SEARCH_ENGINES[key] || SEARCH_ENGINES.ituze;
    }

    function clearSearchImmediate() {
      try {
        searchInput.value = "";
        hideSuggestions();
        searchInput.blur();
      } catch (e) { }
      try {
        localStorage.setItem("clearSearchOnReturn", "1");
      } catch (e) { }
    }

    const UTM_SOURCE = "ItuzeBonheur";

    function appendUtm(url) {
      try {
        // Don't append UTM to internal/relative paths or anchor-only links
        if (!url || url.startsWith("#") || url.startsWith("javascript:")) return url;
        // For relative paths (starting with / but not //)
        if (url.startsWith("/") && !url.startsWith("//")) return url;
        const u = new URL(url);
        u.searchParams.set("utm_source", UTM_SOURCE);
        return u.toString();
      } catch (e) {
        // If URL parsing fails (e.g. relative URL), return as-is
        return url;
      }
    }

    function openLink(url, opts = {}) {
      clearSearchImmediate();
      window.location.href = appendUtm(url);
    }

    function performSearch(query) {
      if (!query || !query.trim()) return;
      const trimmed = query.trim();

      if (trimmed.startsWith(":")) {
        const cmd = trimmed.slice(1).trim();
        const m = cmd.match(/^calc\s+(.+)$/i);
        if (m) {
          const expr = m[1];
          const result = safeCalc(expr);
          showInlineSuggestion(`${expr} = ${result}`, `calc result`, expr);
          return;
        }
        showInlineSuggestion(`Unknown command`, `command`);
        return;
      }

      if (/^wiki:/i.test(trimmed)) {
        const term = trimmed.replace(/^wiki:/i, "").trim();
        if (!term) return;
        openLink("https://en.wikipedia.org/w/index.php?search=" + encodeURIComponent(term));
        return;
      }

      if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) {
        openLink(trimmed);
        return;
      } else if (trimmed.includes(".") && !trimmed.includes(" ")) {
        openLink("https://" + trimmed);
        return;
      } else {
        const engineUrl = getEngineUrl();
        openLink(engineUrl + encodeURIComponent(trimmed));
      }
    }

    function showInlineSuggestion(text, meta, originalQuery) {
      suggestionsBox.innerHTML = "";
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.setAttribute("role", "option");
      div.dataset.query = originalQuery || text;
      div.innerHTML = `<span>${escapeHtml(text)}</span><span class="suggestion-meta">${escapeHtml(meta || "")}</span>`;
      const handler = (e) => {
        e.preventDefault();
        const q = div.dataset.query || text;
        hideSuggestions();
        performSearch(q);
      };
      div.addEventListener("pointerdown", handler);
      div.addEventListener("mousedown", handler);
      div.addEventListener("click", handler);
      suggestionsBox.appendChild(div);
      suggestionsBox.style.display = "block";
      suggestionsBox.setAttribute("aria-expanded", "true");
      activeSuggestionIndex = -1;
    }

    function safeCalc(expr) {
      try {
        const sanitized = expr.replace(/[^0-9+\-*/().%\s]/g, "");
        if (!/^[0-9+\-*/().%\s]+$/.test(sanitized) || sanitized.trim().length === 0) return "invalid";
        const res = Function('"use strict";return (' + sanitized + ')')();
        if (typeof res === "number" && isFinite(res)) return res;
        return String(res);
      } catch (e) {
        return "error";
      }
    }

    function isMathExpression(q) {
      if (!q || typeof q !== "string") return false;
      const trimmed = q.trim();
      if (/[a-zA-Z]/.test(trimmed)) return false;
      return /^[0-9\s\+\-\*\/\.\%\(\)]+$/.test(trimmed) && /[0-9]/.test(trimmed);
    }

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim();
      if (!q) { hideSuggestions(); return; }
      fetchSuggestions(q);
    });

    searchInput.addEventListener("focus", () => {
      const q = searchInput.value.trim();
      if (q && q.length >= 2) fetchSuggestions(q);
    });

    searchInput.addEventListener("keydown", e => {
      const items = Array.from(suggestionsBox.querySelectorAll(".suggestion-item"));
      if (e.key === "ArrowDown" && items.length > 0) {
        e.preventDefault();
        activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
        updateActiveSuggestion(items);
      } else if (e.key === "ArrowUp" && items.length > 0) {
        e.preventDefault();
        activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
        updateActiveSuggestion(items);
      } else if (e.key === "Enter") {
        if (activeSuggestionIndex >= 0 && items[activeSuggestionIndex]) {
          e.preventDefault();
          const text = items[activeSuggestionIndex].dataset.query || items[activeSuggestionIndex].textContent;
          searchInput.value = text;
          hideSuggestions();
          performSearch(text);
        } else {
          performSearch(searchInput.value);
        }
      } else if (e.key === "Escape") {
        if (searchInput.value) searchInput.value = "";
        hideSuggestions();
      }
    });

    function updateActiveSuggestion(items) {
      items.forEach((el, idx) => {
        el.classList.toggle("active", idx === activeSuggestionIndex);
      });
    }

    function debounce(fn, wait) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
      };
    }

    let suggestionAbortController = null;

    const fetchSuggestions = debounce(async (query) => {
      if (!toggleSuggestionsEl.checked || !query || query.length < 2 || toggleLocalOnlyEl.checked) {
        populateHistorySuggestions(query);
        return;
      }

      if (suggestionAbortController) suggestionAbortController.abort();
      suggestionAbortController = new AbortController();

      try {
        const url = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { signal: suggestionAbortController.signal });
        if (!res.ok) throw new Error("suggest fetch failed");
        const data = await res.json();
        window.showSuggestionsFromFetch(data);
      } catch (err) {
        jsonpFallback(query);
      }
    }, 160);

    function jsonpFallback(query) {
      try {
        const cbName = "jsonp_cb_" + Date.now();
        window[cbName] = function(data) {
          try {
            window.showSuggestionsFromFetch(data);
          } finally {
            delete window[cbName];
            script.remove();
          }
        };
        const script = document.createElement("script");
        script.src = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}&callback=${cbName}`;
        script.onerror = function() {
          try { populateHistorySuggestions(query); } finally { delete window[cbName]; script.remove(); }
        };
        document.body.appendChild(script);
      } catch (e) {
        populateHistorySuggestions(query);
      }
    }

    window.showSuggestionsFromFetch = function(data) {
      const results = Array.isArray(data) && data.length > 1 ? data[1] : [];
      suggestionsBox.innerHTML = "";
      activeSuggestionIndex = -1;

      if (results && results.length > 0) {
        suggestionsBox.style.display = "block";
        suggestionsBox.setAttribute("aria-expanded", "true");
        results.slice(0, 6).forEach((item) => {
          const div = document.createElement("div");
          div.className = "suggestion-item";
          div.setAttribute("role", "option");
          div.setAttribute("aria-selected", "false");
          div.dataset.query = item;
          div.innerHTML = `<span>${escapeHtml(item)}</span><span class="suggestion-meta">suggest</span>`;

          const handler = (e) => {
            e.preventDefault();
            searchInput.value = item;
            hideSuggestions();
            performSearch(item);
          };
          div.addEventListener("pointerdown", handler);
          div.addEventListener("mousedown", handler);
          div.addEventListener("click", (e) => {
            e.preventDefault();
            searchInput.value = item;
            hideSuggestions();
            performSearch(item);
          });

          suggestionsBox.appendChild(div);
        });
      } else {
        populateHistorySuggestions(searchInput.value.trim());
      }
    };

    function populateHistorySuggestions(query = "") {
      suggestionsBox.innerHTML = "";
      activeSuggestionIndex = -1;
      hideSuggestions();
    }

    function hideSuggestions() {
      suggestionsBox.style.display = "none";
      suggestionsBox.setAttribute("aria-expanded", "false");
      suggestionsBox.innerHTML = "";
      activeSuggestionIndex = -1;
    }

    // Hide suggestions when clicking anywhere outside the search wrapper
    document.addEventListener("click", (e) => {
      const wrapper = document.querySelector(".chrome-search-wrapper");
      if (wrapper && !wrapper.contains(e.target)) {
        hideSuggestions();
      }
    }, true);

    /* =========================================
       Voice integration
       ========================================= */

    const voiceBtn = document.getElementById("voiceBtn");
    const toggleVoiceAutoEl = document.getElementById("toggleVoiceAuto");
    let recognition = null;
    let isListening = false;
    let supportsSpeech = false;

    function setMicUI(listening) {
      isListening = !!listening;
      voiceBtn.classList.toggle("listening", isListening);
      voiceBtn.setAttribute("aria-pressed", String(isListening));
      try {
        localStorage.setItem("voiceActive", isListening ? "1" : "0");
      } catch (e) { }
    }

    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      supportsSpeech = true;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => setMicUI(true);
      recognition.onend = () => setMicUI(false);
      recognition.onerror = () => setMicUI(false);
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        searchInput.value = transcript;
        if (toggleVoiceAutoEl.checked) performSearch(transcript);
        try { recognition.stop(); } catch (e) {}
        setMicUI(false);
      };
    } else {
      supportsSpeech = false;
      voiceBtn.classList.add("disabled");
      voiceBtn.title = "Voice search not supported in this browser";
    }

    async function startRecognition() {
      if (!supportsSpeech || !recognition) return;
      if (isListening) return;
      try {
        recognition.start();
        setMicUI(true);
      } catch (e) {
        setMicUI(false);
      }
    }

    function stopRecognition() {
      if (!supportsSpeech || !recognition) return;
      try { recognition.stop(); } catch (e) {}
      finally { setMicUI(false); }
    }

    voiceBtn.addEventListener("click", (e) => {
      if (!supportsSpeech) return;
      if (isListening) stopRecognition();
      else startRecognition();
    });

    (function restoreVoiceState() {
      try {
        const saved = localStorage.getItem("voiceActive");
        if (saved === "1") {
          voiceBtn.classList.add("listening");
          voiceBtn.setAttribute("aria-pressed", "false");
        }
      } catch (e) { }
    })();

    /* =========================================
       Settings panel & theme handling
       ========================================= */

    const settingsToggle = document.getElementById("settingsToggle");
    const settingsPanel = document.getElementById("settingsPanel");
    const toggleMatrixEl = document.getElementById("toggleMatrix");
    const toast = document.getElementById("toast");
    const themeSelect = document.getElementById("themeSelect");
    const customColorPicker = document.getElementById("customColorPicker");
    const customColorInput = document.getElementById("customColorInput");
    const customColorHex = document.getElementById("customColorHex");
    const weatherWedge = document.getElementById("weatherWedge");
    const weatherText = document.getElementById("weatherText");
    const shortcutsContainer = document.getElementById("shortcutsContainer");

    function showToast(msg, ms = 1100) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(window._ituze_toast_t);
      window._ituze_toast_t = setTimeout(() => {
        toast.classList.remove("show");
      }, ms);
    }

    function closeAllPanels(exclude = []) {
      const exEls = Array.isArray(exclude) ? exclude.filter(Boolean) : [];

      if (!exEls.includes(settingsPanel)) {
        settingsPanel.classList.remove("open");
        settingsPanel.setAttribute("aria-hidden", "true");
      }
      if (!exEls.includes(iframePanel)) {
        iframePanel.classList.remove("open");
        topBtn.classList.remove("hidden");
        isPanelOpen = false;
      }
      hideContextMenu();
    }

    function openSettings() {
      closeAllPanels([settingsPanel]);
      settingsPanel.classList.add("open");
      settingsPanel.setAttribute("aria-hidden", "false");
    }

    function closeSettings() {
      settingsPanel.classList.remove("open");
      settingsPanel.setAttribute("aria-hidden", "true");
    }

    function toggleSettings() {
      if (settingsPanel.classList.contains("open")) closeSettings();
      else openSettings();
    }

    settingsToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleSettings();
    });

    // Click anywhere outside panels to close them
    document.addEventListener("click", (e) => {
      const target = e.target;
      
      // Don't close if clicking inside iframe panel content
      if (target.closest && target.closest("#iframePanel")) {
        return;

      const root = document.documentElement;
      const isExplicitColor = typeof themeKeyOrColor === "string" && themeKeyOrColor.startsWith("#");
      if (isExplicitColor) {
        const ac = themeKeyOrColor;
        document.documentElement.style.setProperty('--accent', ac);
        document.documentElement.style.setProperty('--matrix-color', ac);
        document.documentElement.style.setProperty('--launcher-border-color', `color-mix(in srgb, ${ac} 25%, rgba(255,255,255,0.18))`);
        document.documentElement.style.setProperty('--launcher-section-bg', 'rgba(15,23,42,0.6)');
        document.documentElement.style.setProperty('--launcher-section-border', `color-mix(in srgb, ${ac} 30%, rgba(148,163,184,0.35))`);
        return;
      }

      const themes = {
        green:  { accent: "#00ff9c", matrix: "#00ff9c" },
        blue:   { accent: "#4da3ff", matrix: "#4da3ff" },
        red:    { accent: "#ff4d4d", matrix: "#ff4d4d" },
        yellow: { accent: "#ffe44d", matrix: "#ffe44d" }
      };
      const t = themes[themeKeyOrColor] || themes.green;
      root.style.setProperty("--accent", t.accent);
      root.style.setProperty("--matrix-color", t.matrix);
      root.style.setProperty("--launcher-border-color", `color-mix(in srgb, ${t.accent} 35%, rgba(255,255,255,0.18))`);
      root.style.setProperty("--launcher-section-bg", "rgba(15,23,42,0.6)");
      root.style.setProperty("--launcher-section-border", `color-mix(in srgb, ${t.accent} 30%, rgba(148,163,184,0.35))`);
    }

    /* =========================================

    // WMO weather code → emoji + label
    const WMO_CODES = {
      0:"☀️ Clear",1:"🌤 Mainly Clear",2:"⛅ Partly Cloudy",3:"☁️ Overcast",
      45:"🌫 Foggy",48:"🌫 Icy Fog",
      51:"🌦 Light Drizzle",53:"🌦 Drizzle",55:"🌧 Heavy Drizzle",
      61:"🌧 Light Rain",63:"🌧 Rain",65:"🌧 Heavy Rain",
      71:"🌨 Light Snow",73:"🌨 Snow",75:"❄️ Heavy Snow",77:"🌨 Snow Grains",
      80:"🌦 Showers",81:"🌧 Heavy Showers",82:"⛈ Violent Showers",
      85:"🌨 Snow Showers",86:"❄️ Heavy Snow Showers",
      95:"⛈ Thunderstorm",96:"⛈ Thunderstorm+Hail",99:"⛈ Heavy Thunderstorm"
    };

    function wmoLabel(code) {
      return WMO_CODES[code] || `Code ${code}`;
    }

    async function fetchWeatherByCoords(lat, lon) {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,precipitation_probability,visibility&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("weather failed");
        const data = await res.json();
        const cw = data.current_weather;
        if (!cw) return null;

        const c = Math.round(cw.temperature);
        const f = Math.round((c * 9 / 5) + 32);
        const kmh = parseFloat(cw.windspeed).toFixed(1);
        const mph = (parseFloat(cw.windspeed) * 0.621371).toFixed(1);
        const summary = `${wmoLabel(cw.weathercode)}  ${c}°C / ${f}°F  💨 ${kmh} km/h`;

        // Build detail card
        const hourly = data.hourly || {};
        const daily  = data.daily  || {};

        // Pick the current hour index from the hourly time array
        const nowISO = new Date().toISOString().slice(0,13);
        const hIdx   = (hourly.time || []).findIndex(t => t.startsWith(nowISO));
        const humidity  = hIdx >= 0 ? (hourly.relativehumidity_2m || [])[hIdx] : null;
        const feelsLikeC = hIdx >= 0 ? (hourly.apparent_temperature || [])[hIdx] : null;
        const precProb  = hIdx >= 0 ? (hourly.precipitation_probability || [])[hIdx] : null;
        const visKm    = hIdx >= 0 ? ((hourly.visibility || [])[hIdx] / 1000).toFixed(1) : null;

        const forecastDays = [];
        const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        for (let i = 1; i <= 3; i++) {
          const dt = (daily.time || [])[i];
          if (!dt) continue;
          const dow  = dayNames[new Date(dt + "T12:00:00").getDay()];
          const hi   = Math.round((daily.temperature_2m_max || [])[i]);
          const lo   = Math.round((daily.temperature_2m_min || [])[i]);
          const code = (daily.weathercode || [])[i];
          forecastDays.push({ dow, hi, lo, icon: (wmoLabel(code) || "").split(" ")[0] });
        }

        renderWeatherDetailCard({
          summary, c, f, kmh, mph,
          humidity, feelsLikeC,
          feelsLikeF: feelsLikeC != null ? Math.round((feelsLikeC*9/5)+32) : null,
          precProb, visKm,
          code: cw.weathercode,
          forecastDays
        });

        return summary;
      } catch (e) {
        return null;
      }
    }

    function renderWeatherDetailCard(d) {
      const body = document.getElementById("weatherDetailBody");
      if (!body) return;

      const row = (label, val) => val != null
        ? `<div class="weather-detail-row">
             <span class="weather-detail-label">${label}</span>
             <span class="weather-detail-value">${val}</span>
           </div>` : "";

      const feelsC = d.feelsLikeC != null ? `${Math.round(d.feelsLikeC)}°C / ${d.feelsLikeF}°F` : null;

      let html = `
        ${row("Condition", wmoLabel(d.code))}
        ${row("Temp", `${d.c}°C / ${d.f}°F`)}
        ${row("Feels Like", feelsC)}
        ${row("Humidity", d.humidity != null ? `${d.humidity}%` : null)}
        ${row("Wind", `${d.kmh} km/h / ${d.mph} mph`)}
        ${row("Precip. chance", d.precProb != null ? `${d.precProb}%` : null)}
        ${row("Visibility", d.visKm != null ? `${d.visKm} km` : null)}
      `;

      if (d.forecastDays && d.forecastDays.length > 0) {
        html += `<div class="weather-forecast-row">`;
        d.forecastDays.forEach(fd => {
          html += `<div class="forecast-day">
            <div class="fd-label">${fd.dow}</div>
            <div class="fd-icon">${fd.icon}</div>
            <div class="fd-temp">${fd.hi}° / ${fd.lo}°</div>
          </div>`;
        });
        html += `</div>`;
      }

      body.innerHTML = html;
    }

    /* GPS permission tracking — only fall back to IP when user explicitly denied */
    let _geoPermissionDenied = false;

    async function getGPSCoords() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) { reject(new Error("no geo")); return; }
        const t = setTimeout(() => reject(new Error("geo timeout")), 10000);
        navigator.geolocation.getCurrentPosition(
          pos => { clearTimeout(t); resolve(pos); },
          err => {
            clearTimeout(t);
            // err.code 1 = PERMISSION_DENIED
            if (err && err.code === 1) _geoPermissionDenied = true;
            reject(err);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
        );
      });
    }

    async function refreshWeatherWidget() {
      let summary = null;

      // 1️⃣ Try GPS first (high accuracy)
      try {
        const pos = await getGPSCoords();
        if (pos && pos.coords) {
          summary = await fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
        }
      } catch (e) { /* falls through */ }

      // 2️⃣ Only use IP geolocation if the user explicitly denied location access
      if (!summary && _geoPermissionDenied) {
        try {
          const ipr = await fetch("https://ipapi.co/json/");
          if (ipr.ok) {
            const ipd = await ipr.json();
            if (ipd && ipd.latitude && ipd.longitude) {
              summary = await fetchWeatherByCoords(ipd.latitude, ipd.longitude);
            }
          }
        } catch (e) { /* silently fail */ }
      }

      if (summary) {
        weatherText.textContent = `Weather: ${summary}`;
        weatherWedge.setAttribute("aria-hidden", "false");
      } else {
        weatherText.textContent = `Weather: N/A`;
        weatherWedge.setAttribute("aria-hidden", "true");
      }
    }

       ========================================= */
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }

    function openLinkWithPrefs(url) {
      openLink(url);
    }

  </script>
