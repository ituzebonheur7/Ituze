<!DOCTYPE html>
<html lang="en">
    <script src="/analytics.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Information - Ituze</title>

<style>
body {
    background: #000;
    color: #00ff00;
    font-family: monospace;
    padding: 40px;
}
h1 { font-size: 26px; }
.box {
    border: 1px solid #00ff00;
    padding: 20px;
    margin-top: 20px;
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
}
td {
    padding: 8px;
    border-bottom: 1px solid #003300;
}
.label {
    font-weight: bold;
    width: 220px;
}
.notice {
    margin-top: 20px;
    color: #00aa00;
}
</style>
</head>
<body>

<h1>What Websites Can See</h1>
<p>This is a cybersecurity awareness demo. No data is stored or logged.</p>

<div class="box">
<table id="infoTable"></table>
</div>

<p class="notice">
Everything shown here is might automatically be shared with websites you visit.
</p>
<script>
async function getIPData() {
    try {
        // Get IP
        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipJson = await ipRes.json();
        const ip = ipJson.ip;

        // Get geo info
        const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
        const geoJson = await geoRes.json();

        return {
            ip: ip,
            country: geoJson.country_name || "Unavailable",
            city: geoJson.city || "",
            org: geoJson.org || "Unavailable",
            hostname: geoJson.hostname || "Unavailable"
        };
    } catch (e) {
        return {
            ip: "Unavailable",
            country: "Unavailable",
            city: "",
            org: "Unavailable",
            hostname: "Unavailable"
        };
    }
}

function detectAdBlock() {
    return new Promise(resolve => {
        const ad = document.createElement("div");
        ad.className = "adsbox";
        document.body.appendChild(ad);
        setTimeout(() => {
            resolve(ad.offsetHeight === 0);
            ad.remove();
        }, 100);
    });
}

function getGPU() {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl");
    if (!gl) return "Unavailable";
    const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
    return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unavailable";
}

function getOS() {
    const ua = navigator.userAgent;
    if (ua.includes("Windows")) return "Windows";
    if (ua.includes("Mac OS")) return "MacOS";
    if (ua.includes("Android")) return "Android";
    if (ua.includes("Linux")) return "Linux";
    if (ua.includes("like Mac")) return "iOS";
    return "Unknown";
}

async function detectPrivateMode() {
    return new Promise(resolve => {
        const fs = window.RequestFileSystem || window.webkitRequestFileSystem;
        if (!fs) resolve("Unknown");
        else fs(window.TEMPORARY, 100,
            () => resolve("No"),
            () => resolve("Yes")
        );
    });
}

async function showInfo() {
    const ipData = await getIPData();
    const adBlocked = await detectAdBlock();
    const privateMode = await detectPrivateMode();

    const data = {
        "Date / Time": new Date().toString(),
        "IP Address": ipData.ip,
        "Country / Location": ipData.country + " " + ipData.city,
        "Host Name": ipData.hostname,
        "ISP": ipData.org,
        "Referring URL": document.referrer || "Direct Visit",
        "Orientation": screen.orientation?.type || "Unknown",
        "Timezone": Intl.DateTimeFormat().resolvedOptions().timeZone,
        "User Time": new Date().toLocaleTimeString(),
        "Language": navigator.language,
        "Incognito / Private Window": privateMode,
        "Ad Blocker": adBlocked ? "Detected" : "Not Detected",
        "Screen Size": `${screen.width} x ${screen.height}`,
        "Colour Scheme": window.matchMedia('(prefers-color-scheme: dark)').matches ? "Dark" : "Light",
        "HDR Screen": window.matchMedia('(dynamic-range: high)').matches ? "Yes" : "No",
        "GPU": getGPU(),
        "Browser": navigator.userAgentData?.brands?.map(b => b.brand).join(", ") || navigator.appName,
        "Operating System": getOS(),
        "Touch Screen": navigator.maxTouchPoints > 0 ? "Yes" : "No",
        "User Agent": navigator.userAgent,
        "Platform": navigator.platform
    };

    const table = document.getElementById("infoTable");

    for (let key in data) {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td class="label">${key}</td>
            <td>${data[key]}</td>
        `;
        table.appendChild(row);
    }
}
showInfo();
</script>
</body>
</html>
