<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Ituze Bonheur</title>
    <style>
        /* Hidden Scrollbar Logic */
        html, body, * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none !important; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #020617;
            background-image: radial-gradient(circle at top, #0b1120 0%, #020617 55%, #000 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .feedback-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { margin: 0 0 10px 0; font-size: 28px; text-align: center; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 15px; }
        
        .form-group { margin-bottom: 22px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .stars { font-size: 36px; color: #1e293b; cursor: pointer; text-align: center; margin-bottom: 25px; transition: transform 0.2s ease; }
        .star { transition: color 0.2s ease, transform 0.2s ease; display: inline-block; }
        .star:hover { transform: scale(1.2); }
        .star.active { color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #020617;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover { background: #f1f5f9; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(255,255,255,0.1); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Anti-Spam Field */
        .hidden-field { display: none !important; visibility: hidden; }

        #success { display: none; text-align: center; animation: fadeIn 0.5s ease-out; }
        .back-home { display: inline-block; margin-top: 25px; color: #38bdf8; text-decoration: none; font-size: 14px; font-weight: 600; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="feedback-container">
    <div id="form-wrapper">
        <h1>Feedback</h1>
        <p class="subtitle">Your thoughts help us shape a better experience.</p>
        
        <form id="feedbackForm">
            <input type="text" name="_honey" class="hidden-field">

            <div class="stars" id="starContainer">
                <span class="star active" data-v="1">&#9733;</span>
                <span class="star active" data-v="2">&#9733;</span>
                <span class="star active" data-v="3">&#9733;</span>
                <span class="star active" data-v="4">&#9733;</span>
                <span class="star active" data-v="5">&#9733;</span>
            </div>
            <input type="hidden" name="rating" id="ratingValue" value="5">

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Anonymous">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" required rows="5" placeholder="Tell us what's on your mind..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="subBtn">Send Feedback</button>
        </form>
    </div>

    <div id="success">
        <div style="font-size: 50px; margin-bottom: 10px;">✨</div>
        <h2>Received!</h2>
        <p style="color: #94a3b8;">Thank you for your valuable input. We've added this to our roadmap.</p>
        <a href="/" class="back-home">Return to Home Page</a>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaV-RwGeznQy8ZGiRPjp9Xo_ouHg-FtqBNl_hmEifVEvuiZs-SZtQJfqJvZch2wPyA/exec';
const VALIDATION_KEY = 'K9v$T2qP8!LmX4zR7@cB'; // Must match Apps Script

const form = document.getElementById('feedbackForm');
form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('subBtn');
    btn.disabled = true;
    btn.innerText = "Sending...";

    const formData = new FormData(form);
    
    // Create the parameters to send
    const params = new URLSearchParams();
    params.append('key', VALIDATION_KEY); // Add the secret key
    params.append('name', formData.get('name') || 'Anonymous');
    params.append('email', formData.get('email') || '');
    params.append('rating', document.getElementById('ratingValue').value);
    params.append('message', formData.get('message'));
    params.append('userAgent', navigator.userAgent);

    try {
        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: params,
            mode: 'no-cors' // Required for cross-domain requests to Google
        });

        // Show Success UI
        document.getElementById('form-wrapper').style.display = 'none';
        document.getElementById('success').style.display = 'block';
    } catch (error) {
        alert("Submission failed. Check your connection.");
        btn.disabled = false;
        btn.innerText = "Submit Feedback";
    }
};
</script>

</body>
</html>
