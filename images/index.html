<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official image gallery for Ituze Bonheur. Explore the meaning behind the logos, colors, and symbol.">
    <title>Ituze Bonheur - Image Gallery</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .image-card {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-width: 450px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .image-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin: 0 auto 15px auto;
        }
        .image-card h2 {
            font-size: 1.5rem;
            color: #0011ff; /* Deep blue to match the theme */
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .image-card ul {
            padding-left: 20px;
        }
        .image-card li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ituze Bonheur Image Gallery</h1>
        <p>A collection of graphics, logos, and their deeper meanings.</p>
    </header>

    <main class="gallery-container">
        
        <article class="image-card">
            <figure>
                <img src="https://ituzebonheur.com/images/ituze.png" 
                     alt="Ituze Bonheur Official Logo with blue background, featuring the letter B, the year 2009, and the number 777." 
                     title="Ituze Bonheur 2009 Blue Logo"
                     width="500" 
                     height="500">
                
                <figcaption>
                    <h2>The Foundation Logo</h2>
                    <p><strong>Design & Symbolism:</strong> This emblem represents the core identity of Ituze Bonheur through specific numbers and colors.</p>
                    <ul>
                        <li><strong>2009:</strong> Represents the birth year, split into "20" and "09". Ituze Bonheur was born on October 7, 2009.</li>
                        <li><strong>Number 777:</strong> Featured prominently on the top right. The number 7 holds profound personal and biblical significance.</li>
                        <li><strong>Color Blue:</strong> The striking blue background symbolizes <em>justice</em> and represents the boundlessness of the <em>sky</em>.</li>
                    </ul>
                </figcaption>
            </figure>
        </article>
        </main>
</body>
</html>
