<!DOCTYPE html>
<html lang="en">
    <script src="/analytics.js"></script>
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Search...</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    </style>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');

            if (query) {
                window.location.replace("https://www.google.com/search?q=" + encodeURIComponent(query));
            } else {
                
                window.location.replace("https://www.ituzebonheur.com");
            }
        })();
    </script>
</head>
<body>
    <p>Searching...</p>
</body>
</html>
