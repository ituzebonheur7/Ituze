<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/ituze.png" type="image/png">
  <title>404 Page Not Found - Ituze</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 90%;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    h1 {
      letter-spacing: -1px;
      line-height: 1;
      font-size: 80px;
      font-weight: 100;
      margin: 0 0 10px 0;
      color: #ffffff;
    }

    p {
      color: rgba(255, 255, 255, 0.7);
      margin: 15px 0;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    code {
      background: #252525;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #ff7b72; /* Subtle red for the error path */
    }

    .error-bold {
      font-weight: bold;
      color: #ffffff;
      font-size: 1.3rem;
    }

    .btn-home {
      display: inline-block;
      padding: 12px 24px;
      background-color: transparent;
      color: #58a6ff;
      border: 1px solid #58a6ff;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .btn-home:hover {
      background-color: #58a6ff;
      color: #121212;
    }

    @media (max-width: 480px) {
      h1 { font-size: 60px; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="/">
      <img src="/images/ituze.png" alt="Ituze Logo" class="logo">
    </a>
    <h1>404</h1>
    <p class="error-bold">404. <span style="font-weight: normal; opacity: 0.6;">That’s an error.</span></p>
    
    <p>
      The requested URL <code id="error-path">/loading...</code> was not found on this server.
      <br>
      <span style="font-size: 0.9rem; opacity: 0.5;">That’s all we know.</span>
    </p>

  <script>
    document.getElementById('error-path').textContent = window.location.pathname;
  </script>

</body>
</html>
