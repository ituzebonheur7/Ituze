<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found - Ituze</title>
  <link rel="icon" href="/images/ituze.png" type="image/png">

  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: rgba(255, 255, 255, 0.03);
      --text-main: #e6edf3;
      --text-dim: #848d97;
      --accent: #58a6ff;
      --error-red: #ffa198;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
    }

    .container {
      max-width: 500px;
      width: 90%;
      text-align: center;
      padding: 40px 20px;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      
      opacity: 0; 
      transform: translateY(20px);
      animation: containerIntro 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    .logo-link {
      display: inline-block;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .logo-link:hover {
      transform: scale(1.05);
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 15px rgba(88, 166, 255, 0.2));
      animation: float 6s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(60px, 20vw, 100px);
      font-weight: 200;
      margin: 0;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    .status-msg {
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--text-main);
    }

    p {
      color: var(--text-dim);
      margin: 15px 0 25px 0;
      line-height: 1.6;
      font-size: 1rem;
      word-wrap: break-word;
    }

    code {
      background: rgba(255, 123, 114, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
      font-family: "SFMono-Regular", Consolas, monospace;
      color: var(--error-red);
      font-size: 0.85rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      min-width: 140px;
    }

    .btn-primary {
      background-color: var(--accent);
      color: #0d1117;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background-color: #79c0ff;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.4);
    }

    @keyframes containerIntro {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 480px) {
      .container {
        width: 95%;
        padding: 30px 15px;
        border-radius: 16px;
      }
      .actions {
        flex-direction: column;
        width: 100%;
      }
      .btn {
        width: 100%;
      }
      h1 {
        letter-spacing: -1px;
      }
    }
  </style>
</head>
<body>

  <main class="container" role="main">
    <a href="/" class="logo-link" aria-label="Go to Homepage">
      <img src="/images/ituze.png" alt="Ituze Logo" class="logo">
    </a>
    
    <h1>404</h1>
    <p class="status-msg">404. <span style="font-weight: normal; opacity: 0.6;">That’s an error.</span></p>  
    
    <p>
      The requested URL <code id="error-path">/loading...</code> was not found on Ituze's server.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">Return Home</a>
      <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
    </div>
  </main>

  <script>
    const currentPath = window.location.pathname;
    const errorDisplay = document.getElementById('error-path');

    errorDisplay.textContent = currentPath.length > 25 
      ? currentPath.substring(0, 22) + '...' 
      : currentPath;

    async function reportError() {
      try {
        await fetch("https://formspree.io/f/xgonrgea", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            error_path: currentPath,
            referrer: document.referrer || "Direct Link",
            user_agent: navigator.userAgent,
            timestamp: new Date().toISOString()
          })
        });
      } catch (e) {
      }
    }

    window.addEventListener('DOMContentLoaded', reportError);
  </script>

</body>
</html>
