<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Ituze</title>
    <link rel="icon" href="images/ituze.png" type="image/png">
    <style>
        :root {
            --glow-color: #00FF41;
            --bg-color: #0a0a0a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 1px solid var(--glow-color);
            padding: 3rem;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            max-width: 400px;
        }
        h1 { font-size: 1.8rem; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #888; line-height: 1.6; margin-bottom: 2rem; }
        .status-tag {
            font-size: 0.8rem;
            background: #222;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 12px 24px;
            cursor: pointer;
            margin: 5px;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--glow-color);
            color: #000;
            box-shadow: 0 0 10px var(--glow-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-tag">SYSTEM_OFFLINE</div>
        <h1>Connection Lost</h1>
        <p>Some features might not work. Please check your internet connection and try again.</p>

<button class="btn" onclick="window.location.reload()">Try again or Reload</button>
<button class="btn" onclick="continueOffline()">Continue</button>

<script>
    function continueOffline() {
        const currentUrl = new URL(window.location.href);
        
        currentUrl.searchParams.set('offline_accepted', 'true');
        
        window.location.href = currentUrl.toString();
    }
</script>
